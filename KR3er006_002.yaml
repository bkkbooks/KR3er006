body:
  text: 卷二時邪合論或謂東南多濕但有溫暑而無傷寒或謂溫暑莫非傷寒所致故非過於寒涼即過於辛散都非中道茲將四時感證一一合論而知風寒溫暑燥濕皆能著人為病常氣異氣之不同是邪非邪之互異臨證瞭然斯無或混內經云今夫熱病者皆傷寒之類也程效倩曰開口便道破熱病為傷寒之類其與傷寒自是兩病蓋傷寒有統屬之傷寒有分隸之傷寒所賅者廣又曰內經傳經熱病是傷寒之類實非傷寒而即瘟疫也內經曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑程郊倩曰內經全文俱是説熱病恐人失去了冬傷於寒春必病溫之旨故以凡病傷寒而成溫者八字結出之是其言熱都是言溫溫病已成在春不發在夏亦發溫與暑實是一病與時令之溫病時令之暑病從外得之者不同難經以中風傷暑飲食勞倦傷寒中濕為五邪其意以中風屬肝木傷暑屬心火飲食勞倦屬脾土傷寒屬肺金中濕屬腎水肝病中風得之心病傷暑得之脾病飲食勞倦得之肺病傷寒得之腎病中濕得之此自病者為正邪也肝病中濕得之心病中風得之脾病傷暑得之肺病飲食勞倦得之腎病傷寒得之此從後來者為虛邪也肝病傷暑得之心病飲食勞倦得之脾病傷寒得之肺病中濕得之腎病中風得之此從前來者為實邪也肝病傷寒得之心病中濕得之脾病中風得之肺病傷暑得之腎病飲食勞倦得之此從所不勝來者為賊邪也肝病飲食勞倦得之心病傷寒得之脾病中濕得之肺病中風得之腎病傷暑得之此從所勝來者為微邪也難經以中風傷寒濕溫熱病溫病為五傷寒其意以中風傷寒應風寒二氣濕溫應暑濕二氣熱病應燥火二氣溫病則為異氣故中風傷寒濕溫熱病各指脈形而溫病之脈則日行在諸經不知何經之動各隨其經所在而取之也仲景云太陽病發熱汗出惡風脈緩者名為中風方中行曰太陽病三字即首條所揭脈浮頭項強痛而惡寒者是也後皆仿此柯韻伯曰中風惡風類相感也風性散漫脈應其象故浮而緩仲景云太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒程郊倩曰太陽雖同而寒屬陰邪而發熱較遲於中風然巳未之間必惡寒特甚自不同中風之僅惡風而稍兼惡寒也其體則痛陰寒擊於經隧而氣血凝泣自不同中風之無內擊也其嘔則逆寒邪束於皮毛氣無從越而壅上自不同中風之乾嘔僅鼻鳴而氣不甚逆也脈陰陽俱緊以寒主徑急而且為實邪故緊而浮沉俱有力則大不同於陽浮陰弱之緩脈矣證與脈非中風能混即推之暑濕溫熱俱不得以其似是者混名曰傷寒也仲景云太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇若火熏之一逆尚引日再逆促命期柯韻伯曰太陽中暑亦有因於傷寒者雖渴而仍惡寒太陽溫病反不惡風而渴是病根不因於寒而因於風發熱者病在表法當汗解然不惡寒則非麻桂所宜風與溫相搏發汗不如法風去而熱反熾灼熱者兩陽相熏灼轉成陽明之候也程郊倩曰溫病初得病在經隧之間治法只宜求之太陽暑之裡陽明暑之表如所云心中懊憹舌上苔者梔子豉湯主之渴欲飲水口乾舌燥者白虎加人參湯主之脈微發熱渴欲飲水小便不利者豬苓湯主之之類陽暑者動而得之之症潔古東垣所謂中熱即仲景所謂中暍也陰暑者靜而得之之症潔古東垣所謂中暑其實非暑邪也乃因暑而致之病蓋亦傷寒之類張鳳逵曰劉復真謂暑脈虛而微弱按之無力又脈來隱伏弦細芤遲皆暑脈也脈虛身熱謂之傷暑中暍脈虛而微者是也寒病脈日變溫熱脈不變寒病脈浮洪有力者易治芤細無力者難治無脈者不治溫熱則不然溫有一二部無脈者暑熱有三四部無脈者被火所逼勒而藏伏耳非絶無也照經用辛寒藥火散而脈起脈起而病愈要在辨之詳耳周禹載曰中暑一症不過清心利小便解暑毒補真氣而已即脈來虛弱重者伏匿喘促逆冷卒然昏暈不可用溫此熱傷元氣用溫則助陽耗陰且冬月脈浮緊浮緩分傷寒中風夏月弦緊傷風弦緩中暑表疏自汗則脈虛表致無汗則脈緊耳世俗不明曰夏月陰氣在內大順散為必用之藥夫陰非寒也陽外而陰內耳丹溪云伏陰在內陰字有虛之義作陰冷則誤矣火令之時爍石流金何陰冷之有孫真人用生脈散氣虛可知也古人用大順散非謂伏陰本治冰果所傷冷香飲子治陽氣大虛多欲厥逆漿水散治汗多亡陽脈微欲絶其餘不過清暑益氣湯消暑十全散十味香薷飲之類足矣濕溫者先傷於濕又中於暑暑濕相搏而為病也王宇泰曰昔人治濕溫通身皆潤足冷至膝下腹滿不省人事六脈皆小弱而急問所服藥皆陰病藥也此非受病重藥能重病耳以五苓合白虎十餘劑稍蘇更與清燥湯調理而安凡陰病厥冷兩臂皆冷今脛冷臂不冷則非下厥上行故知非傷微寒厥而合用溫熱藥也喻嘉言立三氣一門三氣者熱濕暑是也蓋春分以後秋分以前少陽相火少陰君火太陰濕土各行其令也天之熱氣下地之濕氣上人在其中受其炎蒸無隙可避多有氣倦神昏肌膚痱起胸膺痤出頭面癤生甚則消渴癰疽吐瀉瘧痢無所不病內經運氣主病凡屬少陰君火即與太陰濕土一例同推不分彼此而太陰司天濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之治濕之法則然矣下文即出治熱之法云濕上甚而熱治以苦溫佐以甘辛以汗為散而止飲食勞倦難經列之五邪李東垣獨以內傷立論然亦必稍兼外感故東垣補中益氣亦用升麻柴胡以發表王宇泰曰內傷外感兼見而相合者脈症尤宜細心求之若顯內症多者則是內傷重而外感輕宜以補養為先若顯外症多者則是外感重而內傷輕則以發散和解為主此又東垣未言之意也飲食勞倦又宜分而為二勞倦傷為不足用東垣補中益氣飲食傷為有餘用潔古枳朮丸又按王安道曰枳朮丸之類雖曰消導尚有補益之意存乎其間此物滯氣傷消補並行者宜之若所傷之物枳朮丸所不能去者備急丸煮黃丸瓜蒂散等潔古東垣亦未嘗委之而勿用也又按秦景明曰凡治夾食傷寒不可先攻其食且先發散寒邪次可消導之也喻嘉言謂內經秋傷於濕上痿而咳發為氣厥應是秋傷於燥而凡諸氣膹郁諸痿喘嘔之症皆是燥氣為病爰立秋燥一門可謂補千古之未備但所制清燥救肺湯一方都是內因之藥必合寓意草中二案以觀之始足盡秋令時邪之治吳吉長乃室新秋病灑淅惡寒寒已發熱漸生咳嗽然病未甚也服表散藥不愈身日尪羸延至初冬飲以參朮補劑轉覺奄奄欲絶食飲不思有咳無聲瀉痢不止危在旦夕是病總為誤藥所致始先皮毛間灑淅惡寒肺金為時令之燥所傷用表散已為非法至用參朮補之則肺氣閉錮而咳嗽之聲不揚胸腹飽脹不思飲食肺中之熱無處可宣急奔大腸食入則不待運化而直出食不入則腸中之垢汙亦隨氣奔而出是以瀉痢無休今以潤肺之藥兼潤其腸則源流俱清寒熱咳嗽泄瀉一齊俱止方用黃芩地骨皮甘草杏仁阿膠初進一劑瀉即少止四劑畢而寒熱俱除又數劑而咳嗽俱全愈鄉人王氏婦秋月亦病寒熱服參朮後亦奄奄一息但無咳嗽十餘日不進粒米亦無大便時時暈去不省人事喻以大黃芒硝甘草石膏四味為粗末與之遂將二劑連服頃之腹中弩痛下結糞數塊進粥二盞前病如失仲景以痙濕暍三者合論則痙與濕不同柯韻伯曰六氣為病皆能發熱然寒與熱相因暑與濕相從獨燥與濕相反濕病多得之地氣燥病多得之內因此病因之不同也內經病機十九條燥症獨無若諸痙項強皆屬於濕愚竊疑之傷寒論有痙濕之分又云太陽病發汗太多因致痙則痙之屬燥無疑也瘟疫者沿門闔境老少強弱觸之即病乃天地之癘氣也疫癘之邪都從口鼻而入直行中道流布三焦非比傷寒六經可表可下吳又可曰疫邪內不在臟腑外不在經絡舍於伏脊之內去表不退附胃亦近乃表裡之分界是為半表半裡即針經瘧論所謂橫連膜原是也所制達原飲一方用檳榔二錢厚朴一錢草果仁五分三味協力攻堅直達其巢穴使邪氣潰敗速離膜原又慮發熱作渴之症三者重傷津液故加知母一錢以滋陰白芍一錢以和血黃芩以清熱甘草五分以調中後人治疫皆遵此議若喻嘉言所治之疫值明季兵荒之後乃大疫也故以人參敗毒散為主方與又可頗異而其論症甚詳爰為採入喻曰世俗所稱大頭瘟者頭面腮頤腫如瓜果者是也所稱蝦蟆瘟者喉痹失音頸筋腫大者是也所稱瓜瓤瘟者胸高脅起嘔血如汁者是也所稱疙瘩瘟者遍身紅腫發塊如瘤者是也所稱絞腸瘟者腹鳴乾嘔水泄不通者是也所稱軟腳瘟者便清泄白足重難移者是也治法未病前預服芳香正氣藥則邪不易入此為上也邪既入急以逐穢為第一義上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒經謂一陰一陽結謂之喉痹王太僕曰一陰者手少陰君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二火皆主脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則痹痹甚而不通則死矣蓋手少陰少陽君相二火獨甚則熱結正絡故病且速也十二經中言嗌乾咽痛喉腫頷腫舌本強皆君火為之喉痹急速相火所為也君火猶人火相火猶龍火人火焚木其勢緩龍火焚木其勢速內經之言喉痹則咽與舌在其間以其病同是火故不分也治喉痹之火與救火同內經火鬱發之謂發汗也然咽喉中豈能發汗故出血者乃發汗之一端也近世有爛喉痧之名最易傳染蓋亦瘟疫之類解表清熱兩途一失其宜禍生反掌不可不慎也霍亂之症仲景載之傷寒後而不與中暑合論熱多欲飲水者五苓散主之寒多不用水者理中丸主之治法已備具矣道光初遍地多朝發夕死之症一起腹痛吐瀉脈道歇絶故難施治其可治者或用大熱而愈或用大寒而愈則知仲景寒多熱多之旨為千古不易準繩也凡斑屬血疹屬氣斑疹初見即當細看葉天士曰看胸背兩脅點大而在皮膚之上者為斑或云頭隱隱或瑣屑小粒者為疹又宜見而不宜見多按方書謂斑色紅者屬胃熱紫者熱極黑者胃爛亦必看外症所合方可斷之然而春夏之交濕病俱發疹為甚且其色要辨如淡紅色四肢清口不甚渴脈不洪數非虛斑即陰斑或胸微見數點面赤足冷或下利清穀此陰盛格陽於上而見當溫之若斑色紫小點者心胞熱也點大而紫胃中熱也黑斑而光亮熱勝毒甚雖屬不治若其人氣血充者或依法治之尚可救若黑而晦者必死若黑而隱隱四旁赤色火鬱內伏大用清涼透發間有轉紅成可救者若夾斑帶疹皆是邪之不一各隨其部而泄發出宜神情清爽為外解里和之意斑疹出而昏者正不勝邪內陷為患或胃津內涸之故再有一種白㾦小粒如水晶色者此濕熱傷肺邪雖出而氣液枯也必得甘藥補之或未至久延傷及氣液及濕鬱衛分汗出不徹之故當理氣分之邪或白枯如骨者多凶為氣液竭也幼科最多痧疹聶久吾曰最忌誤用溫熱早用寒涼此二語最為扼要婦人病溫與男子同但多胎前産後與經水適來適斷葉天士曰大凡胎前病古人皆以四物加減治之謂護胎為要恐來害妊如熱極用井底泥藍布浸冷覆蓋腹上等皆是保護胎元之意但亦要看其邪之可解處用血膩之藥不靈又當審察不可認板法然須步步保護胎元恐損正邪陷也至於産後之法按方書慎用苦寒藥恐傷其已亡之陰也然亦要辨其邪能從上中解者稍從症用之亦無妨也不過無犯下焦且屬虛體當如虛怯人病邪而治總之無犯實實虛虛之禁況産後當氣血沸騰之後最多空竇邪勢必乘虛內陷虛處受邪為難治也如經水適來適斷邪將陷血室傷寒少陽言之詳悉不必多贅但溫熱與正傷寒不同仲景立小柴胡湯提出所陷熱邪參棗扶胃氣以衝脈隸屬陽明也此與虛者為合治若熱邪陷入與血相結者當宗陶氏小柴胡湯去參棗加生地桃仁楂肉丹皮或犀角等若本經血結自甚少腹必滿痛輕者刺期門重者小柴胡湯去甘藥加延胡歸尾桃仁挾寒加肉桂心氣滯者加香附陳皮枳殼等然熱陷血室之症多有譫語如狂之象防是陽明胃實當辨之血結者身體必重非若陽明之輕旋便捷何以故耶陰主重濁絡脈被阻側旁氣痹連胸背皆拘束不遂故去邪通絡正合其病往往延久上逆心胞胸中痛正陶氏所謂血結胸症也王海藏出一桂枝紅花湯加海蛤桃仁原為表裡上下一齊盡解之理看此方大有巧手故録出以備學者之用中寒症屬少陰經即傷寒之重者耳王節齋曰病有感有傷有中感者在皮毛為輕傷者兼肌肉稍重中者屬臟腑最重寒有感寒傷寒中寒風有感風傷風中風暑有感暑傷暑中暑當分輕重表裡治各不同又如中風中濕中毒中者中也謂邪直入於中也四氣著人每多伏邪為患生氣通天論曰春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必病溫陰陽應象大論曰春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽冬傷於寒春必病溫王安道曰據此四傷諸家注釋皆不得經旨蓋由推求太過故也夫風暑濕寒者天地之四氣也洞泄也痎瘧也咳與痿厥也溫病也皆是因其發動之時形證昭著乃逆推而知其昔日致病之原為傷風傷暑傷濕傷寒耳非是初受傷之時能預定其今日必為此病也且夫傷於四氣自當時即發者有過時發病者有久而後發病者有過時之久自消散而不成病者蓋因邪氣之傳變聚散不常及正氣之虛實不等也按六氣雖分主四時每多伏氣為患故傷寒不必定屬於冬而溫病亦嘗適見於冬春溫因冬不藏精暑之為病每盛發於秋而瘧痢諸邪都因伏暑而發即嘉言所補秋燥一篇亦謂不應於新秋而應於十月瘧疾一症方舊雖有痰食寒熱瘴癘之互異然因暑發俱多薛立齋曰大凡瘧症皆因先傷於暑次感於風客於營衛之間腠理不密復遇風寒閉而不出舍於腸胃之外與營衛並行晝行於陽夜行於陰並則病作離則病止並於陽則熱並於陰則寒淺則日作深則間作在氣則早在血則晏痢疾一症古稱滯下蓋里有滯濁而後下也但滯在氣滯在血冷傷熱傷而滯非一症之大法則機要所云後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重劑竭之身涼自汗以熱藥溫之風邪內結宜汗之鶩溏而利宜溫之可謂要言不煩類傷寒症不可不知許叔微曰近似傷寒者有五症發熱而惡寒者傷寒之候也脈浮而數發熱惡寒或有痛處是欲為癰膿也脈浮按之反澀發熱惡寒或膈熱而嘔吐此傷食也脈浮而滑發熱而背寒或頭眩而嘔吐此風痰症也脈浮而弦發熱而惡寒或思飲食此欲作瘧也李士材曰類傷寒有五症一曰痰中脘停痰憎寒發熱自汗胸滿但頭不痛項不強與傷寒異耳一曰食積胃中停食發熱頭痛但身不痛不惡寒不浮緊與傷寒異耳一曰腳氣足受寒濕頭痛身熱肢節痛便閉嘔逆但腳氣或腫滿或枯細與傷寒異耳一曰內癰脈浮數當發熱惡寒若有痛處飲食如常蓄積有膿也胸中痛而咳脈數咽乾不渴濁吐腥鼻肺癰也少腹重按之痛便數如淋汗出惡寒身皮甲錯腹皮腫急脈滑數腸癰也胃脘痛手不可近胃脈細人迎盛者胃脘癰也六氣之行本乎五運司天在泉亦宜參以活法何柏齋曰天元紀大論等篇以年歲之支幹分管六氣蓋已失先聖之旨矣年歲之支幹天下皆同且通四時不變者也天氣之溫暑寒涼民病之虛實衰旺東西南北之殊方春夏秋冬之異候豈有皆同之理此其妄誕蓋不待深論而可知近世傷寒治法則以得病日之干支為主其源亦出於此決不可用蓋金木水火土之氣各主一時當時則為主氣為司天非其時而有其氣則為客氣與時正相反者則為在泉蓋其氣伏於黃泉之下而不見也治療之法用熱遠熱用寒遠寒所謂必先歲氣毋伐天和也春時木
