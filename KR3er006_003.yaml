body:
  text: 卷三雜症合論偏枯者半身不隨也風痱者身無痛四肢不收也近世所見二症居多總名之曰中風喻嘉言曰中絡邪正衛猶在經脈之外故但肌膚不仁中經則邪入營脈之中內而骨外而肉皆失所養故軀殼為之重著然猶在軀殼之間至中腑中臟則離軀殼而內入邪中深矣臟腑必歸於胃者胃為六腑之總司也廩於腸胃並舉大小二腸並重蓋風性善行空竅水穀入胃則胃實腸虛風邪即進入腸中少頃水穀下胃則腸實胃虛風復進入胃中見胃風必奔迫於二腸之間也風入胃中胃熱必盛蒸其津液結為痰涎壅塞隧道胃之支脈絡心者才有壅塞即堵其神氣出入之竅故不識人也諸臟受邪至盛必進入心而亂其神明神明無主則舌縱難言廉泉開而流涎沫也類中之症河間主火東垣主氣丹溪主濕王安道曰三子所論自是因火因氣因濕而為暴病暴死之症內經所云三陰三陽發病為偏枯痿易四肢不舉亦未嘗必因於風也夫風火氣濕之殊望聞問切之異豈無所辨乎內風之症即景嶽所云非風也如陰中之水虛則病在精血陰中之火虛則病在神氣蓋陽衰則氣去故神志為之昏亂非火虛乎陰虧則形壞故肢體為之廢弛非水虛乎今以形離神壞之症乃不求之水火之原而猶以風治鮮不危矣試以天道言之其象亦然凡旱則多燥燥則多風是以風木之火從乎燥燥則陰虛之候也故凡治內風者專宜培補真陰以救根本使陰氣復則風燥自除矣然外感者非曰絶無虛症氣虛則虛也內傷者非曰絶無實證有滯則實也治虛者當察其在陰在陽而直取之治實者但當察其因痰因氣而暫開之此於內傷外感及虛實攻補之間最宜察其有無微甚而酌其治也甚至有元氣素虛卒然仆倒上無痰下失禁瞑目昏沉此厥絶之證尤與風邪無涉使非大劑參附或七年之艾破格挽回又安望其復元氣於將絶之頃哉葉天士曰凡中風證有肢體縱緩不收者皆是陽明氣虛當用人參為首藥而附子黃耆炙草之類主之若短縮拘攣則以逐邪為急唐許胤宗治中風不語用黃耆防風二味煮湯置床下蒸之是夕便能語後人遂將二味煎服加白朮名玉屏風散為治風要方金匱黃耆桂枝五物湯即小建中去甘草飴棗加黃耆也本治血痹醫宗金鑑移治偏枯左半身不遂則加當歸以和血右半身不遂則倍黃耆以補氣手軟倍桂枝足軟加牛膝骨軟加虎骨元氣虛加人參陽氣虛加附子以偏枯由於營衛之虛故血痹之方可以通用又按喻嘉言曰凡治一偏之病治宜從陰引陽從陽引陰從左引右從右引左蓋觀樹木之偏枯者將灌其枯者乎抑灌其未枯者使榮茂而因以條暢其枯者乎口噤身冷為喑厥四肢不收為風痱河間所謂心火暴甚腎水虛衰之證制地黃飲子一方熟地培根本之陰桂附蓯蓉巴戟返真元之火山茱石斛溫肝平胃茯苓菖蒲補心通腎麥冬五味保肺以滋化源諸藥等分每用五分加薄荷煎湯濁藥軟投故云飲子痹者風寒濕雜合之證李士材曰內經論痹即其曰雜至曰合則知非偏受一氣可以致痹又曰風勝為行痹寒勝為痛痹濕勝為著痹即其下一勝字則知但分邪有輕重未嘗非三氣雜合為病也筋痹屬肝遊行不定上下左右隨其虛邪與氣血相搏聚於關節或赤或腫筋脈弛縱古稱走注今名流火脈痹屬心臟腑移熱復遇外邪客搏經絡留而不行故𤸷痹肌肉熱極唇口反裂皮膚色變肌痹屬脾留而不移汗多四肢緩弱皮膚不仁精神昏塞今名麻木皮痹屬肺邪在皮毛癮疹風瘡搔之不痛宜疏風養血骨痹屬腎痛苦切心四肢攣急關節浮腫鶴膝風者即三氣之痹於膝者也如膝骨日大上下左右日枯細者且未可治其濕先養氣血俾肌肉漸榮後治其濕可也八風五痹之證最宜藥酒而必以史國公藥酒方為勝當歸二兩杜仲薑汁炒二兩牛膝酒浸二兩白朮土炒二兩枸杞四兩平補足三陰經虎脛骨四兩壯骨而祛風鱉甲酥炙二兩益陰血而去肝風防風二兩羌活二兩松節二兩晚蠶砂炒二兩萆薢二兩蒼耳子炒四兩秦艽四兩茄根飯蒸八兩等藥為末用絹袋盛之煮無灰酒三十斤煮熟退火氣服之每日數次常令醺醺不斷既以祛風又能去濕而左癱右瘓口眼喎斜四肢疼痛等證皆可愈矣痿證與痹證不同由於真陰之虛不可妄用風藥張子和曰大抵痿之為病皆由客熱而成好欲貪色強力過極漸成痿證故痿躄屬肺脈痿屬心筋痿屬肝肉痿屬脾骨痿屬腎總由肺受火熱葉焦之故相傳於四臟痿病成矣治痿獨取於陽明者何蓋以陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也朱丹溪曰肺熱則不能管攝一身脾傷則四肢不能為用而諸痿之病作瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有虞天民曰西北二方在人為腎水肺金所居之地二臟常恐其不足東南二方在人為肝木心火所居之地二臟常恐其有餘虎潛丸為治痿要方龜板四兩羊肉半斤搗爛作丸虎骨一兩皆血肉之品而一取滋陰一取補形一取祛風並通絡脈熟地二兩黃柏四兩填少陰之精知母二兩清太陰之氣牛膝三兩當歸一兩白芍兩半滋厥陰之血諸藥皆滯佐陳皮七錢半以疏之諸藥皆涼佐瑣陽一兩以溫之丸用淡鹽湯下引以下達使經脈充盈絡脈通利則痿可愈矣此方乃補陰通絡之要方又不徒治痿也陽痿之證方書多雲命門火衰惟王節齋發明腎經鬱熱之義云曾親見一二人服黃柏知母清金滋腎而愈原氣虛與虛損不同喻嘉言曰原氣虛可復虛損難復虛損又有易復難復兩候因病致虛者緩調自復因虛致損者虛上加虛卒難復也丹溪論勞瘵主乎陰虛者蓋自子至巳屬陽自午至亥屬陰陰虛則熱在午後子前寤屬陽寐屬陰陰虛則汗從寐時盜出升屬陽降屬陰陰虛則氣不降氣不降則痰涎上逆而連綿不絶脈浮屬陽沉屬陰陰虛則浮之洪大沉之空虛也世人病陰虛極多而陰中之水虛與陰中之火虛最宜分別王太僕曰倏熱往來時發時止是無水也晝見夜伏夜見晝止不時而動是無火也當求其屬而主之無火者宜益火之源以消陰翳無水者宜壯水之主以制陽光寒者熱之熱者寒之此其常也惟陰虛之人最宜詳審王太僕曰大寒而盛熱之不熱是無火也大熱而盛寒之不寒是無水也病有假熱真寒則何以治之李瀕湖曰陰寒在下虛陽在上治之以寒則陰寒愈甚治之以熱則拒而不內熱藥冷服下咽之後冷性既消熱性便發病氣隨愈此熱因寒用法也按金匱男子脈大為勞脈極虛亦為勞脈大則氣分泄越如建中歸脾四君異功等所宜也脈虛則精血下奪如六味八味左歸右歸大造天真等所宜也若陰虛枯燥之極不受補劑者雖有清金滋肝之法終難為力乾血勞證最宜審察血傷則無以沃其膚故甲錯也目得血而能視營氣不貫於空竅故黯黑也此證補之不可涼之無益仲景有大黃蟅蟲丸之法以地黃十兩為君以大黃十兩蒸為臣以甘草二兩白芍四兩桃仁一兩杏仁一升為佐以乾漆一兩之苦蟅蟲一升水蛭百枚臍螬百枚虻蟲一升之咸為使又有陳大夫所傳百勞丸可以參酌互用吳鶴皋曰濁陰不降則清陽不升今人遇一勞證便用滋陰服而不效坐以待斃術豈止此耶咳嗽一證分外感內傷張景嶽曰外感之咳必由皮毛而入皮毛為肺之合而凡外邪襲之則必先受於肺久而不愈則必自肺而傳於五臟內傷之咳必起於陰分肺屬燥金為水之母陰損於下則陽孤於上水涸金枯火過於燥肺燥則癢癢則咳不能已朱丹溪曰上半日嗽者胃中有火也黃昏嗽者脾肺氣虛也午後嗽者腎中陰火也徐叔拱曰咳嗽外感六淫鬱而成火必六淫相合內傷五臟相勝必五邪相併有此不同而中間又有斂散二法斂者謂收斂肺氣也散者謂解散寒邪也宜斂而散則肺氣弱一時發散而走泄正氣為害非輕宜散而斂則肺寒邪一時斂住害亦非小且如感風咳嗽已經散之後其表虛復感寒邪虛邪相併又為喘嗽若欲散風則愈重而虛其肺若收斂則愈又滯其邪當先輕解漸次斂之肺不致虛邪不致滯喘嗽自止矣李辰山曰丹溪以麻黃人參同用謂之一散一補凡表邪入肺失於疏散經年咳嗽百藥無功自非麻黃終難搜逐即虛勞咳嗽火浮於肺帶節麻黃同貝母收功人疑而畏之何不取丹溪之言一再思之肺痿因肺受火炎久則肺竅俱閉喉間或癢或瘡嗽有血點痰帶紅線六葉遂日焦枯而成痿矣仲景復脈湯千金生脈散錢氏阿膠散喻氏清燥救肺湯皆可選用肺癰由氣血混一壅滯不行仲景葶藶大棗瀉肺湯千金葦莖湯併為要劑又考喻嘉言治肺癰皆用活法斡旋因肺癰不可用補而脾虛又不能生肺肺燥喜於用潤而脾滯又難於運食今日脾虛之極食飲不思則於清肺藥中少加參末以補脾明日肺燥之極咳逆有加則於清肺藥中少加阿膠以潤燥血證有傷陽傷陰之分柯韻伯曰氣亢於上焦之陽分則陽絡傷血隨氣而上溢於口鼻桃仁承氣湯以下之血隨氣而下陷於二便補中益氣湯以舉之氣有餘必挾火當用苦寒以涼其氣氣不足便挾寒宜用甘溫以益其氣此調氣之大法也又曰血自心來者補心丹主之脾來者歸脾湯主之肺來者生脈散主之腎來者腎氣丸主之此補血之大法也劉宗厚曰四物湯此特血病而求血藥之屬也若氣虛血弱又當從古人血虛以人參補之陽旺即能生陰血也補佐之屬若紅花桃仁蘇木丹皮血竭者血滯所宜蒲黃阿膠地榆百草霜棕櫚灰者血崩所宜蓯蓉瑣陽牛膝枸杞龜板夏枯草益母者血虛所宜乳香沒藥五靈脂凌霄花者血痛所宜乳酪血液之物血燥所宜薑桂血寒所宜苦參生地汁血熱所宜繆仲淳曰治吐血有三訣宜行血不宜止血宜補肝不宜伐肝宜降氣不宜降火葉天士曰凡咳血之脈右堅者治在氣分系震動胃絡所致宜薄味調養胃陰如生扁豆茯神北沙參苡仁等類左堅者乃肝腎陰傷所致宜地黃阿膠枸杞五味等類脈弦脅痛者宜蘇子桃仁鬱金降香等類成盆盈碗者葛可久花蕊石散或大黃黃連瀉心湯一證而條分縷析從此再加分別則臨證有據矣衄者皆因經絡熱盛陽氣壅重迫血妄行而出於鼻也以犀角地黃湯為主方口鼻俱出為大衄血歸脾湯加童便藕節舌上出血曰舌衄先用蒲黃煎湯漱之次用槐花炒研摻之黃耆六一湯合生脈散服之熱湧舌上出血如泉川文蛤為散摻之虛熱舌脹大出血不止生乾薑蒲黃為末摻之血從齒縫中或齒齦中出者曰齒衄又曰牙宣有風壅有腎虛有胃火消風補腎清胃宜審診施治耳中出血為耳衄以龍骨燒灰吹之有肝火有腎虛宜臨證施治血從目出因誤藥而為壞證者斷不可救若暴病發熱見此梔子豉湯加犀角秦皮丹皮赤芍血從毛孔中出者為肌衄脈數當歸補血湯脈浮黃耆建中湯脈弱保元湯脈盛當歸六黃湯便血有腸風臟毒脈痔之分又有陽氣不升下部虛而下血者一見革脈即宜溫補葉天士曰凡心肝為剛臟可受柔藥脾腎為柔臟可受剛藥羅謙甫治便血立法以平胃散作主加桂附乾薑歸芍重加炒地榆以收下濕即此意也溲血與血淋不同痛屬火盛血淋也土牛膝一味煎膏服之不痛屬虛溲血也若腎陰虧損六味加土牛膝或過服助陽藥而致者為難治反胃一證朝食暮吐暮食朝吐因胃中無陽不能容受食物而然非比食已即吐者為胃火沖逆也仲景大半夏湯以人參佐半夏取腑病以通為補之義而又佐以白蜜衝入水中揚之二十四遍用以煮藥升之緩之總欲其宣揚穀氣也噎膈與反胃不同飲食之際氣忽阻塞如有物梗塞者名曰噎心下格拒飢不能食或食到喉間不能下咽者名曰膈此因陽氣內結陰血內枯而成丹溪有韭汁牛乳飲汪訒庵曰丹溪所言養血益陰潤燥和胃調中不必盡備其方可以意會治噎膈諸藥韭汁散瘀竹瀝薑汁消痰童便降火人乳牛乳潤燥養血蘆根汁止嘔茅根汁涼血蔗汁和胃荸薺汁消食驢尿殺蟲或加燒酒米醋白蜜和諸汁頻服亦佳關格一證陰陽各極其偏不能相營先哲云人迎候陽一盛在少陽膽與三焦也二盛在太陽膀胱小腸也三盛在陽明胃與大腸也四盛以上者陽脈盛而陰無以通故曰格陽寸口候陰一盛在厥陰肝與心主也二盛在少陰心與腎也三盛在太陰脾與肺也四盛以上者陰脈盛而陽無以交故曰關陰喻嘉言曰自靈素難經仲景皆深言之然無其方也因為上下古今尋一死裡求生之治治吐逆之格由中而漸透於上治不溲之關由中而漸透於下治格而且關由中而漸透於上下姑立進退黃連湯要未可為中人道也按仲景黃連湯治上下寒熱不和為升降陰陽之劑喻氏師其意而進退之方中黃連進則錢半退則七分進則生用退則薑製乾薑進退俱用錢半進則生用退則炮用人參進退俱用錢半進則生用退則乳制桂枝進用一錢退則不用製半夏進退俱用錢半大棗進退俱用二枚統論進退二法總以胃為轉旋而未及治下夫腎為胃關腎氣不足則小便必不能利此退法中又須腎氣丸以培其下元也嘔與吐不同王安道曰嘔者東垣所謂聲物俱出者也吐者東垣所謂物出而無聲者也至若干嘔與噦皆聲出而無物也東垣但以噦概之而無干嘔之論夫乾嘔與噦所異者微甚而已矣乾嘔乃噦之微噦乃乾嘔之甚乾嘔者其聲輕小而短噦者其聲重大而長又曰咳逆俗以厄逆及厄忒呼之治厄忒亦有用橘皮竹茹湯而愈者然則噦逆厄忒病雖不同而為邪正之氣怫鬱擾亂所致則一也吐酸與中酸不同劉河間曰肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸或口淡者胃熱也凡中酸法宜溫藥散之者亦猶解表之義若久酸不已則亦不宜溫之宜以寒藥下之後以涼藥調之膈氣之證與噎膈不同噎膈由漸而成難任剛藥膈氣因胃陽衰微陰乘陽位以致粒米不入日久不食諸多蛔蟲上居膈間非辛辣不能開之喻氏歷治多人皆至半月不食而得生者不出理中六君及旋覆代赭湯去代赭加赤石脂之治也嘈雜與吞酸一類張路玉曰皆由肝氣不舒相火乘及脾胃治法不必用伐肝之劑以六君子湯補脾運痰火盛作酸者用吳萸川連六郁者氣鬱濕鬱痰鬱熱鬱血鬱食鬱也滑伯仁曰氣鬱者胸脅痛濕鬱者關節痛周身疼遇陰寒則發痰鬱者動則氣喘寸口脈沉滑熱鬱者昏瞀小便赤脈沉數四肢無力能食食鬱者噯酸腹飽不能食左寸脈和平右寸脈緊甚五郁者五行之郁也趙養葵曰東方生木木者生生之氣即火氣也火附木中木鬱則火亦郁火鬱則土鬱土鬱則金鬱金鬱則水鬱五行相因自然之理余用逍遙散一方治木鬱而諸郁皆愈古方逍遙散柴胡薄荷當歸白芍陳皮甘草白朮茯神其加味者則丹皮山梔余以山梔屈曲下行泄水改用吳茱炒連即左金丸黃連清心火吳茱氣燥肝氣亦燥同氣相求以平肝木木平則不生心火火不刑金而金能制木不直伐木而佐金以制木此左金所以得名也繼用六味地黃加柴胡白芍以滋腎水俾能生木逍遙散風以散之也地黃飲雨以潤之也凡熱寒往來惡寒惡熱嘔吐吞酸嘈雜胸痛脅痛少腹膨脹頭眩盜汗疝氣飧泄等證皆對證之方倘一服即愈少頃復發或頻發而愈甚此必下寒上熱之假證此湯不可復投當改用溫補之劑怔忡之證心胸築築振動惶惶惕惕無時得安者是也歸脾湯為要藥離魂病身形作兩並臥不辨真假不語問亦無答有人病此用人參硃砂茯苓濃煎服真者氣爽假者即化五癇分五臟見證錢仲陽曰反折上竄其聲如犬證屬肝也目瞪吐舌其聲如羊證屬心也目直腹痛其聲如牛證屬脾也驚跳反折手縱其聲如雞證屬肺也肢體如尸口吐涎沫其聲如豬證屬腎也一説有馬癇而無犬癇馬癇者但走不得眠其狀如馬者是也有人患此醫用皂莢丸而愈又按薛立齋曰癇證當滋腎以生肝血則風自熄而痰自消治分虛實天淵不可不辨癲狂之證昔人以為陽並於陰陰並於陽即內經重陰重陽之義狂則少臥不眠妄言妄笑甚則上屋逾牆其候多躁而常醒實者用內經生鐵落飲乃白虎承氣虛者壯水以制火癲則或歌或笑如醉如癡甚則不知穢潔其候多靜而常昏實者用滾痰丸清心丸虛者當養神而通志驚恐二證有輕重之分張景嶽曰因病而驚者當察客邪以兼治其標因驚而病者宜安養心神滋培肝膽專以扶元為主恐之傷人尤甚於驚甚則心怯而神傷精卻則陰痿日消月縮不亡不已非大勇大斷必不能拔去其根室晦之證即左傳所謂晦淫惑疾也喻嘉言曰吾鄉熊仲舒幼男髫齡患一奇證飲食如常但脈細神呆色夭氣奪左傳所謂近女室晦即是此病彼因近女又遭室晦故不可為今受室晦之疾而未近女是可為也乃依治楊季登女病邪祟例用犀角羚羊角龍齒虎威骨牡蠣粉鹿角霜人參黃耆羊肉等少加牛黃丸服旬日而安臟躁之證婦人病也喜悲傷欲哭像如神靈所作數欠伸金匱用甘草小麥大棗名甘麥大棗湯方後注云善補脾氣則知是方不獨為女科設也遺滑之證有夢屬心妙香散主之無夢屬腎固精丸主之脾胃濕熱豬䐗丸主之妙香散用人參一兩黃耆一兩山藥二兩薑汁炒遠志一兩炒茯苓一兩茯神一兩所以補其正丹砂二錢麝香二錢所以解其邪木香二錢半炙甘草二錢半交和於中桔梗二錢載引於上使正氣旺而邪惑不侵則遺泄可愈矣上為末空心溫酒下二錢又考王荊公方於本方中去黃耆山藥二香加益智仁二兩五花龍骨二兩則稍兼固澀之意也是方亦治驚悸鬱結固精丸用鹿茸二具鹿角霜分兩同升固督脈以督脈主一身之陽也真陽不固則用陽起石五錢以提之強陽用事則用韭菜子五錢以抑之蓯蓉浸淡一錢五味五錢巴戟肉五錢製附子五錢皆峻補真陽之品石脂五錢煅龍骨五錢攔截精竅茯苓五錢淡滲經氣使諸藥歸就腎經以成封固之功也豬䐗丸系劉松石方用白朮四兩健脾勝濕白色苦參三兩堅腎去濕牡蠣四兩鹹寒清熱止遺丸以豬肚一具煮爛搗藥為丸屬水中之土能厚胃泄水空朝米飲送下久服不獨止遺即勞瘦之人亦可使之肥也腫脹之症陰陽虛實不同李士材曰陽症必熱熱者多實陰症必寒寒者多虛先脹於內而後腫於外者為實先腫於外而後脹於內者為虛小便黃赤大便祕結者為實小便清白大便溏泄者為虛脹滑數有力者為實脈浮弦細澀者為虛色紅氣粗者為實色悴聲短者為虛凡實或六淫外客或飲食內傷陽邪急速其來必暴每成於數日之間凡虛或情志多勞或酒色過度日積月纍其來有漸每成於經月之後又曰經云諸濕腫滿皆屬於脾又云其本在腎其標在肺皆聚水也又云腎者主水胃之關也關門不利故聚水而從其類也腫脹之病諸經雖有無不由於脾肺腎者脾主運行肺主氣化腎主五液凡五氣所化之液悉屬於腎五液所行之氣悉屬於肺轉輸二臟以制水生金者悉屬於脾故腫脹不外此三經也治法分內外上下虛實不可不辨在外則腫越婢湯小青龍湯症也在內則脹十棗丸神祐丸症也在上則喘葶藶大棗湯防己椒目葶藶大黃丸症也在下則小便閉沉香琥珀丸疏鑿飲子症也此皆治實之法若夫虛者實脾飲腎氣丸濟生方加牛膝車前為治腫要方症也王節齋曰喘與脹二症相因必皆小便不利喘則必生脹脹則必生喘先喘而後脹者治在肺先脹而後喘者治在脾喻嘉言曰凡禽畜之類有肺者有尿無肺者無尿肺壅而小便不行以清肺為急按脹症氣分不治宜治血絡久病必入絡也葉天士治一徐姓小兒單腹脹數月幼科百治無功僉用肥兒丸等俱不驗效乃用歸鬚桃仁延胡山甲蜣螂蟅蟲五靈脂山楂之類為丸十日全愈婦人病腫尤宜分別水分血分金匱云先腫而後經斷者為水分先斷經而後腫者為血分古方載腫脹五不治唇黑傷肝缺盆平傷心臍出傷脾背平傷肺足底平滿傷腎消渴分三種許叔微曰一者渴而飲水多小便數脂似麩片甜者消渴病也二者吃食多不甚渴小便少似有油而數者中消病也三者渴飲水不能多便腿腫腳先瘦小陽痿弱小便數此腎消症也按仲景腎氣丸為治腎消之要藥或有不宜於桂附者可用六味湯喻氏載鄧橘存治傷熱消渴堅令服一千劑而愈又考葉天士治消渴於六味湯中加牛膝車前導引腎肝可謂善用古方許叔微神效散用海浮石蛤粉蟬退為散鯽魚膽七個調服亦治消渴之良方也黃疸之症有表裡虛實之分趙羽皇曰經雲中央色黃入通於脾外主肌肉上應濕化今太陰濕氣熾盛濕滯熱蒸鬱而不發如龕曲相似遂成黃疸治法有汗下之分補瀉之異焉今人但用平胃五苓茵陳湯之類清熱滲利之外並無他説雖然其濕熱之盛於腸胃者或可攻之若鬱於皮膚之間而不得發越過用疏利則濕熱反內陷而不得出仲景治身熱發黃有麻黃連翹赤小豆湯無非急解其表令熱邪自外而散方書止知可降而不知可升者非理也至於素患脾虛寒涼過甚或小便清白而大便微溏力倦神疲而脈細少氣皆太陰脾氣極虛而真色外見之候惟用補中益氣湯略加車前牛膝一二味濕勝者連理湯尤宜今人一遇此症不問其孰實孰虛在表在裡概用寒涼通劑詎知脾胃虛者不宜寒寒之則中氣愈敗脾胃弱者不宜降降之則下多亡陰或攻或補或升或降總在隨症變通黃疸變黑為女勞疸用硝石礬石散硝石即芒硝之底沉凝者性急下趨苦鹹入血散血消瘀礬石燒一用緑礬酸寒除錮熱在骨髓二味等分為散用大麥汁和服方寸匕此用急奪下焦之瘀血乃死裡求生之治也又羅謙甫治陰黃於四逆湯中加茵陳名茵陳四逆湯痰與飲不同柯韻伯曰痰飲之本皆水也經云飲食入胃遊溢精氣上輸於脾此自陽入陰也脾氣散精上歸於肺此地氣上升也通調水道下輸膀胱此天氣下降也水精四布五經並行是水入於經而血乃成也若陰陽不和清濁相干胃氣亂於中脾氣艱於升肺氣滯於降而痰飲隨作矣痰與飲同源而有陰陽之別陽盛陰虛則水氣凝而為痰陰盛陽虛則水氣溢而為飲除痰者降氣清火是治其標補陰利水是治其本也滌飲者降氣燥濕是治其標溫腎利水是治其本也按治飲有中下之分如金匱所云苓桂朮甘湯主之腎氣丸亦主之是也治飲有脾胃之分如金匱小半夏湯小半夏加茯苓湯二方治胃外臺茯苓飲治脾是也治飲有內外之分如仲景小青龍治外飲真武治內飲是也頭痛一症須分三陽及厥陰治之外風內風陽虛火鬱無不有之最宜詳審頭風有偏正之分偏者主乎少陽或補或瀉總以柴胡為要傷及肝陰者咸涼柔鎮正者有氣虛血虛痰厥腎厥陰傷陽浮火亢邪風之不同眩暈一症乃肝膽風陽上冒非外風也火盛者用羚羊山梔連翹花粉元參鮮生地丹皮桑葉以清泄上焦絡熱此先從膽治也痰多必理陽明消痰如竹瀝薑汁菖蒲橘紅二陳湯之類中虛必用人參外臺茯苓飲是也下虛必從肝治補腎滋肝育陰潛陽鎮攝之治是也至於天麻鉤藤菊花之屬皆系熄風之品隨症加入可也厥巔之疾氣與血俱逆於高巔故動輒暈去婦人為多喻嘉言治吳添官母以代赭龍膽蘆薈黃連降其上逆之氣以蜀漆丹皮赤芍行其上郁之血以牡蠣龍骨五味斂其浮遊之神最要在每劑藥中入生豬膽汁二枚蓋以少陽熱熾膽汁必干取同類相求之義也面痛有虛實之分張路玉曰面為陽明部分而陽維起於諸陽之會皆在於面故面痛皆屬於火暴痛多實久痛多虛高者抑之郁者開之血熱者涼之氣虛者補之目疾初起最要分別風寒風火內障之症因頭風致變者多須從內風主治不可過用風藥耳中之症體虛失聰責在心腎邪干竅閉責在膽經以腎開竅於耳心寄竅於耳膽絡脈附於耳也鼻中之病手太陰手陽明主病經又云膽移熱於腦令人辛頞鼻淵白芷辛散統治鼻病以白芷一兩散陽明之風辛夷仁五兩散太陰之風蒼耳仁炒去皮二錢半散巔腦之風並能去腐止淵薄荷葉二錢氣味俱輕能上行至高之分為散每服一錢蔥白湯及茶清湯服服之不效亦宜參用治本之法齒痛在胃為熱清胃散主之在腎為虛石刻安腎丸主之若有外邪壅遏者辛溫散寒辛涼泄上之法亦不可廢瘰癧婦女為多不可輕用散堅追毒之劑外臺祕要曰肝腎虛熱則生癧矣一方用前胡兩半川貝一兩元參二兩大力子二兩黃芩兩半昆布一兩海藻一兩紫背天葵一兩夏枯草二兩煎湯泛丸每服三錢有效若久潰脈浮大邪火盛也面色㿠白金剋木也皆不治若赤脈貫瞳子有幾條則幾年死肩背作痛手太陰足陽明為病肺朝百脈肺病則不能管束一身故肺愈為病即肩背作痛又背為陽明之府陽明有虧不能束筋骨而利機關即肩垂背曲若外邪為患當從太陽經治沖氣上攻當從少陰經治臂痛分六道李東垣曰以兩手仰直垂下大指居前小指居後而定之臂臑之前廉痛者屬陽明升麻白芷乾葛為引經後廉屬太陽藁本羌活為引經外廉屬少陽柴胡連翹為引經內廉屬厥陰柴胡當歸為引經內前廉屬太陰升麻白芷蔥白為引經內後廉屬少陰細辛當歸為引經胸痹之症人所通患喻嘉言曰胸中如離照當空曠然無外地氣一上則窒塞有加仲景用栝蔞之潤以豁痰薤白之滑以利竅使以白酒淡而不滯引藥上行以解散窒塞之邪重者用附子乾薑切不可任用香燥心痛有五初學記曰五臟失治皆為心痛刺治分經理甚明析至若舍針用藥尤宜審此詳義蓋腎心痛者多由寒邪上衝故善瘈如從後觸其心胃心痛者多由停滯故胸腹脹滿脾心痛者多由寒逆中焦故其病甚肝心痛者多由木火之郁病在血分故色蒼蒼如死狀肺心痛者多由上焦不清病在氣分故動作則痛益甚若知其在氣則順之在血則行之鬱則開之滯則逐之火多實則或散或清之寒多虛則或溫或補之必真心痛者乃不可治腹痛一症分無形有形無形為患如寒凝火鬱氣阻營虛及夏秋暑濕痧穢之類有形為患如蓄血食滯癥瘕蛔蟯內疝及平素偏好成積之類審其痛勢之高下色脈之衰旺細究其因確從何起大抵在臟者以肝脾腎為主在腑者以腸胃為主脅痛有左右之分左脅作痛專主厥陰肝經右脅乘肺乘脾俱有或泄木以安土或清金以平木左金丸用黃連為君六兩薑汁炒以直瀉其子吳茱一兩鹽水泡氣臊與肝同氣相求故必用以為佐金鈴子散用金鈴子去核一兩泄肝家氣分之熱延胡索炒一兩泄肝家血分之熱雪羹用荸薺四個以散結海蛇漂淨一兩以潛陽三者俱為要方若血絡受傷又當從事於仲景旋覆花湯之治矣腰痛一症腎為主治腰者腎之腑也腎與膀胱為表裡在外為太陽在內屬少陰又為衝任督帶之要會有內因外因不內外因之別仲景腎著湯用乾薑炮辛熱以燥濕白朮炒苦溫以勝濕茯苓甘淡以滲濕甘草和中而補土腎病而皆用脾藥益土即所以制水也有寒者加附子或加肉桂澤瀉杜仲牛膝積聚之症越人以積者陰氣五臟所生聚者陽氣六腑所成巢氏以不動為癥動者為瘕亦即積聚之意大凡屬腑屬臟以經脈所過部分別之又初病氣結在經久病血傷入絡用藥須於辛香之中加入蠕動之品透松病根方能有效疝症之因不外乎寒故仲景獨以寒疝立名其所制當歸生薑羊肉湯三味以名其方亦為産後下虛要藥等方惟以祛散寒邪調養補虛為事並不雜入氣分之藥又子和歷詳筋疝水疝狐疝㿗疝氣疝血疝寒疝七者之名總以辛香流氣為主蟲有五種許叔微曰千金謂勞則生熱熱則生火心蟲曰蛔脾蟲寸白腎蟲如截絲縷肝蟲如爛杏肺蟲如蠶五蟲皆能傷人惟肺蟲為急肺蟲居肺葉之內蝕人肺系故成瘵疾咳血聲嘶藥所不到治之為難有人説道藏中載諸蟲皆頭向下行惟自初一至初五以前頭上行故用藥多取月初以前蓋謂是也淋濁二症痛者為淋不痛者為濁淋有氣血砂膏勞五者之殊氣淋為病小便澀滯常有餘瀝不盡血淋為病遇熱即發甚則溺血痛者為血淋不痛者為尿血砂淋為病陰莖中有砂石而痛砂出痛止是也膏淋為病溺出如膏敗精結者為砂精結散者為膏又煮海為鹽之義勞淋遇勞即發通淋通瘀虎林湯為要方濁有赤濁白濁之分戴元禮曰赤濁屬血由心小腸火也白濁屬氣由肺大腸金也葉天士又發明便濁精濁之治便濁用萆薢分清飲等精濁傷及督任必用升固八脈之氣腿痛亦分六經李東垣曰前廉為陽明白芷升麻葛根為引經後廉為太陽羌活防風為引經外廉屬少陽柴胡羌活為引經內廉為厥陰青皮吳萸為引經內前廉為太陰蒼朮白芍為引經內後廉為少陰獨活澤瀉為引經痛有血虛血寒寒濕風濕濕熱流注陰虛陽虛腎虛風襲之殊足痛一症外感者惟寒濕濕熱風濕之流經入絡經云傷於涼者下先受之當以治濕為主其間佐溫佐清佐散隨症以制方內傷則不外肝脾腎三者之虛或補中或填下或養肝隨症以施治喻嘉言論足上麻木有熱極似寒之症如夏月之反雨冰雹也宜以竹瀝等清絡為主
