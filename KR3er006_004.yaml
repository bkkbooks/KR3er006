body:
  text: 卷四治法合論肺為嬌臟而朝百脈主一身元氣形寒飲冷則傷肺火熱刑金亦傷肺傷陽傷陰是當詳辨痹論云淫氣喘息痹聚在肺肺位至高六氣著人肺先受之治肺為急用藥最貴輕清其腑為大腸位居於下通腑之法又不可不講也心為神明之主經云損其心者調其營衛而營衛之調亦分陰陽桂枝加龍骨牡蠣等湯補心之陽也養心湯補心丹補心之神也仲景瀉心諸湯雖曰瀉心實則瀉胃瀉其子也其腑為小腸位居於下通腑之法又不可不講也包絡繫心亦為一臟熱邪塞竅牛黃丸至寶丹最能通絡又考趙以德論金匱苓桂朮甘湯之治亦本靈樞包絡脈動主議則知熱痰宜涼寒飲宜溫又當分別三焦亦為一臟其實上中下三者分管臟腑最當詳辨葉天士曰仲景傷寒分配六經河間溫暑專究三焦故柯韻伯論陽明三症亦主三焦分治熱在上焦用梔子豉湯吐之上焦得通津液得下胃家不實矣熱在中焦用白虎湯清之胃火得清胃家不實矣熱在下焦用豬苓湯主之火從下泄胃家不實矣若雜症之分三焦亦有其要王叔和曰假令病人聞穀氣臭者病為在上焦假令病人少多為欲食不食亦可病為在中焦假令病人飲食如故病為在下焦脾胃同處中州亦宜分別治之滑伯仁曰劉河間謂補瀉脾胃之本者蓋以脾胃中和之氣也燥其濕則為瀉潤其燥則為補喻嘉言曰補虛有二法一補脾一補胃如瘧痢後脾氣衰弱飲食不運宜補其脾如傷寒後胃中津液久耗宜補其胃葉天士曰納食主胃運化主脾脾宜升則健胃宜降則和又曰太陰濕土得陽始運陽明陽土得陰自安仲景急下存陰其治在胃東垣大升陽氣其治在脾肝為剛臟有瀉無補然四時之所化始於木究十二經之所養始於肝肝尤不可不養肝之治有數種水虛而木無以生地黃丸乙癸同源是也土虛而木無以植參苓白朮散緩肝培土是也本經血虛有火用逍遙散清火血虛無水用歸脾湯養陰瀉火之治上類乎心補火之法下同乎腎其腑為膽瀉腑之法則柴胡溫膽為要方矣腎為先天之本有補無瀉故仲陽獨有六味丸補腎而無瀉腎之方然左為腎右為命門水火得其正則為精為氣水火失其和則為熱為寒水中不可無火無火則陰勝而寒病生火中不可無水無水則陽勝而熱病起如水虧陰虛只宜大補真陰切不可再伐陽氣火弱陽虛只宜大補元陽切不可再傷陰氣其腑為膀胱外應皮毛協營衛而主一身之表臟氣足則腑不受邪矣奇經不可不究李瀕湖曰陽維起於諸陽之會由外踝上行於衛分陰維起於諸陰之交由內踝上行於營分所以為一身之綱維也陽蹺起於跟中循外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之蹺捷也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰挾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督脈主身後之陽任沖主身前之陰以南北言也帶脈橫束諸脈以六合言也喻嘉言曰奇經所主雖不同正經之症其關於營衛則一也葉天士曰凡沖氣攻痛從背而上者系督脈主病治在少陰從腹而上者系衝任主病治在厥陰或填補陽明絡脈不可不究以初病在經久病在絡也喻嘉言曰經有十二絡亦有十二絡者兜絡之義即十二經之外城也復有胃之大絡脾之大絡及奇絡之大絡則又外城之通界皇都出入之總途也故又曰絡有十五焉十二經生十二絡十二絡生一百八十系絡系絡生一百八十纏絡纏絡生三萬四千孫絡自內而生出者愈多則愈小稍大者在俞穴肌肉間營氣所主外廓由是出諸皮毛方為小絡表症汗之此其常也而亦有先宜於補者許叔微治鄉人邱生病傷寒發熱頭痛煩渴脈雖浮數而無力尺以下遲而弱許曰此雖麻黃症而尺遲弱仲景云尺中遲者營氣不足氣血微少未可發汗於是於建中湯內加當歸黃耆合飲翌日脈尚爾其家煎迫日夜促發汗藥幾不遜矣許忍之但用建中調營而已至五日尺部方應遂授麻黃湯啜第二服發狂須臾少定略睡已中汗矣信知此事誠難仲景雖云不避晨夜即宜便治醫者亦須顧其表裡虛實待其時日若不循次第暫時得安虧損五臟以促壽限何足貴也重症緩治用法之詳審也而有不得不急者喻嘉言治朱孔陽年二十五歲形體清瘦素向安逸夏月因構訟奔走日中濕熱合內郁之火而成痢疾晝夜一二百次不能起床以粗紙鋪於褥上頻頻易置但進水而不能食其痛甚厲肛門如火烙揚手擲足躁擾無奈喻診其脈弦緊徑急不為指撓謂曰此症一團毒火蘊結於腸胃之間其勢如焚救焚須在頃刻若二三日外腸胃朽腐矣於是以大黃四兩黃連甘草各二兩入砂鍋內煎隨滾隨服服下人事稍安片刻少頃仍然躁擾一晝夜服至二十餘碗大黃俱已煎化黃連甘草俱至無汁次日病者再求前藥喻診畢見脈勢稍柔知病可愈但用急法不用急藥遂改用生地麥冬各四兩另研生汁而以花粉丹皮赤芍甘草各一兩煎成和汁大碗咽之以其來勢暴烈一身津液從之奔竭待下痢止然後生津養血則枯槁難回今脈勢既減則火邪俱退不治痢而痢自止豈可泥潤滯之藥而不急用乎服此果然下痢盡止但遺些少氣沫耳緩緩調至旬余方能進谷治熱邪急症豈可無此急法耶暑熱當令而發者易辨而伏暑之症至冬月而發者尤不可不辨吳茭山治一婦人冬月感病灑灑惡寒翕翕發熱惡食乾嘔大便欲去不去諸醫皆以虛弱痰飲治以二陳補心等藥不效延及半月吳診其脈虛而無力類乎傷暑衆不然也究問病因其婦曰因天寒換著綿衣取綿套一床蓋之須臾煩渴寒熱嘔吐延綿至今耳吳曰誠哉傷暑也蓋綿套曬於盛暑夾熱收入笥中必有暑氣尚未泄今人體虛得之易之故病如是其婦曰然遂制黃連香薷飲二服而愈凡病在危急必得出奇制勝方能速愈李瀕湖治外甥柳喬素多酒色病下極脹痛二便不通不能坐臥立哭呻吟者七晝夜用通利藥不效遣人叩李李曰此乃濕熱之邪在精竅道壅脹隧路病不在大腸膀胱而在二陰之間故前阻小便後阻大便乃用楝實茴香穿山甲諸藥入牽牛加倍煎服一服而減三服而平喻嘉言治葉茂卿乃郎出痘未大成漿其殼甚薄兩月後尚有著肉不脫者一夕腹痛大叫而絶喻用梨汁入溫湯灌之立蘇頃復痛絶灌之又蘇遂以黃芩二兩煎湯和梨汁與服痛止令制膏子藥頻服不聽其後忽肚大無倫一夕痛叫小腸突出臍外五寸交鈕各二寸半如竹節壺頂狀莖物交摺長七八寸明亮如燈籠外症從來未經聞見喻知其為肺熱而氣壅不行仍為治之以黃芩阿膠二味清肺之熱潤肺之燥日進十餘劑三日後始得小水五日後水道清利臍收腫縮而全愈凡病至延久藥初投之而效繼投之而不效者必求其本而治之柯韻伯治孫介夫春間病咯血旋愈旋作初服芩連而愈繼而寒涼不效更進參耆而愈後用溫補不效復用寒涼而又不效因而就商於柯柯曰斯未求其本耳諸寒之而熱者取諸陰所謂求其屬也君病陰虛而陽盛以寒藥治之陽少衰故病少愈耳復進寒涼而陽亦虛得溫補而病少愈耳再進溫補而陰愈虛復進寒涼而陰陽俱虛故連綿而不解耳豈知臟腑之源有寒熱溫涼之主哉必壯水之主以制陽光方為合法因立加減腎氣丸一劑而喘嗽安再劑而神氣爽膏粱多虛藜藿多實此其常也而亦有異焉者富貴之人讀書明理不乏修身養性者且富貴有二種創業之富貴多由艱難困頓而成血脈筋骨充實至一再傳之後則專事豢養安佚而已貧賤之人飢餓勞役最多內傷症憂愁困苦最多七情症且貧賤有二種生而貧賤者其心安終貧賤而其始本不貧賤者其心不安素問脫營失精二義不可不知南北之說亦不可拘王節齊曰李東垣北醫也羅謙甫得其法以聞於浙朱丹溪南醫也劉宗厚世其學以鳴於陝西方中行曰東南之人何嘗不病其東南之風寒西北之人豈可不病其西北之暑濕設有人焉正已奪而邪方盛者將顧其正而補之乎抑先其邪而攻之乎見有不的則死生系之此其所以宜慎也夫正者本也邪者標也若正氣既虛則邪氣雖盛亦不可攻蓋恐邪未去而正先脫呼吸變生則措手無及故治虛邪者當先顧正氣正氣存則不至於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急暫從權宜從少從多寓戰於守斯可矣此治虛之道也若正氣無損者邪氣雖微自不宜補益補之則恐正無與而邪反盛適足以藉寇兵而資盜糧故治實症者當直去其邪邪去則身安但法貴專精便臻速效此治實之道也要之能勝攻者方是實症實者可攻何慮之有不能勝攻者便是虛症氣去不返可不寒心此邪正之本末有不可不知也惟是假虛之症不多見假實上最多也假寒之症不難治而假熱之治多誤也然實者多熱虛者多寒如丹溪曰氣有餘便是火故實能受寒而余續之曰氣不足便是虛故虛能受熱世有不明真假虛實而曰知醫者則未敢許也邪氣盛則實精氣奪則虛二句為治病之大綱其詞似顯其義甚微最當詳辨而辨之有最難者何也蓋實言邪氣實宜瀉也虛言正氣虛宜補也凡邪正相搏而為病則邪實正虛皆可言也故主瀉者則曰邪盛則實當瀉也主補者則曰精奪則虛當補也各執一白茫無定見藉口文飾孰得言非是以至精之訓反釀莫大之害不知理之所在有不可移易者奈時醫不能察耳余請析此為四曰孰緩孰急其有其無也所謂緩急者察虛實之緩急也無虛者急在邪氣去之不速留則生變也多虛者急在正氣培之不早臨期無濟也甚虛甚實者亦治其實可一掃而除也微虛微實者所畏在虛但固守根本先為已之不可勝則邪無不退也二虛一實者兼其實開其一面也二實一虛者兼其虛防生不測也總之實而誤補固必增邪猶可解救其禍小虛而誤攻真氣忽去莫可挽回其禍大虛實之緩急不可不察也所謂有無者察邪氣之有無也凡風寒暑濕燥火皆能增邪邪之在表在裡在腑在臟必有所居求得其本則直取之此所謂有有則邪之實也若無六氣之邪而病出三陰則皆情欲以內傷勞倦以傷外非邪似邪非實似實此所謂無無則病在元氣也不明緩急有無四義必至以逆為從以標作本絶人長命損德多矣可不懼且慎哉
