body:
  text: 卷五古今方補注白虎加桂枝湯仲景方溫疸二瘧但熱不寒治須清降桂枝調和營衛金匱用於白虎湯中引領熱邪仍從外泄用之恰當二進必愈然此乃邪發於手太陰肺經故可頃刻致和而瘧已若熱氣深伏陰虛內熱而病涉足少陰又當參鱉甲首烏養陰之例蒼朮白虎湯濕溫之症暑濕相搏其脈陽濡而弱陰小而急其症頭項多汗兩足逆冷譫語若視為虛寒而投以溫補誤之甚矣白虎湯為治暑熱之正劑加蒼朮以治其濕暑濕兼治尤為要方然恐寒降太過許叔微治王彥龍先用人參白虎繼用蒼朮白虎是兼顧其中氣也玉女煎景嶽方陽明少陰二經皆是津液所關陽明實則火熾而津液涸少陰虛則水虧而津液亦涸考兩經合治之方仲景豬苓湯養陰而兼利水景嶽玉女煎養陰而兼清火蓋白虎湯治陽明而不及少陰六味地黃湯治少陰而不及陽明是方石膏清胃佐知母以泄肺氣實則瀉其子也熟地滋腎佐麥冬以清治節虛則補其母也牛膝入絡通經能交和中下尤為八陳中最上之方追瘧飲體瘧飲何人飲並景嶽方三方並用制首烏當歸以瘧邪既久無不傷及營血也追瘧飲用於氣血未甚大衰之候而少陽半表之邪尚滯於經故用柴胡半夏陳皮青皮甘草以和之休瘧飲用於汗散既多意專固其元氣故加人參炒白朮炙草以補之不特止瘧且為善後計也何人飲則於補虛之中又兼去寒故加人參以補中邪用陳皮以和中生薑以溫中也三方並用陰陽水煎露一宿次早清晨服柴芩煎景嶽方此方治表邪未解內外皆熱暑瘧煩渴協熱下利水蓄髮黃等證柴胡散表邪黃芩梔子清裡熱枳殼快氣以調和表裡澤瀉木通滲濕以通利三焦凡喜冷氣壯脈象滑數者並宜用之如瘧痢並行鮮血純血者加白芍甘草濕勝氣陷者加防風若營虛不能作汗者又當參合歸柴煎之例而加當歸炙草矣清燥湯東垣方燥與濕相反此方多用去濕之品而特以清燥名者蓋取清肅肺金之義肺為辛金主氣大腸為庚金主津今為濕熱之邪所困則腎水生化之源絶而痿躄喘渴之症作是方用人參三分黃耆錢半茯苓三分白朮一錢蒼朮一錢陳皮五分甘草二分補土以生金麥冬二分五味子九粒保金而生水黃連一分黃柏二分當歸二分生地二分瀉火滋陰豬苓二分澤瀉五分升麻三分柴胡三分升清降濁使治節有權則水出高源而諸症自愈是方重在濕熱故不用潤劑與喻氏清燥救肺各成一格也清燥救肺湯喻嘉言方喻氏補秋燥一門以正四時以備六氣可謂發前人之所未發但燥氣傷人必由陰分先虛非比風寒暑濕由於外感者多所制清燥救肺湯治諸氣膹郁諸痿喘嘔之症純以生津保肺立法並不雜入外感之藥石膏二錢半煅用清肺中之熱麥冬去心一錢滋肺中之陰阿膠真者八分補肺中之血佐胡麻一錢炒研滑以利竅人參七分補肺中之氣佐杏仁去皮尖炒黃八分苦以豁痰經霜桑葉三錢枇杷葉一片去毛蜜炙輕清涼泄復用甘草一錢以和之統論全方清金平木以制亢逆之火補胃生肺以壯高原之水名之曰救肺涼而能補之謂也痰多加貝母栝蔞血枯加生地熱甚加犀角羚羊角牛黃泄郁不用辛香清熱不用苦寒凡治燥症之權衡已畢具於此矣星附散中風之症手足嚲曳者因虛風寒痰阻遏脾中陽氣而然也夫既曰虛風則必忌用治風之藥曰寒痰則必遍舉燥痰之藥方中南星制殭蠶炒川烏制黑附白附皆辛熱之品人參茯苓半夏制則調養正氣者矣每藥止用二分煎成熱服以助脾中之陽此寓發散於不發散之中也烏頭粥本事方此治風淫末疾痹在手足者也用香熟白晚米二合入薑製川烏末四錢以砂罐煮作稀粥入生薑自然汁一匙白蜜三匙攪勻空心溫啜之從營衛所生之地注力故合谷味如中濕多再加薏苡仁三錢凡半身不遂腫痛不能舉者服此預防之保陰煎汪纘功方此方治虛勞名曰保陰者以虛勞未有不因於陰虛也方中二地壯水為君二冬清金為臣龍眼悅脾而生金制水玉竹潤肺而益腎養肝陰不足者補之以味人乳龜板血肉之品滋燥益陰復佐以茯苓山藥調和脾胃使無陰柔偏勝之虞牛膝引藥下行石斛煎湯代水使虛羸之體得以充血生津而有所恃內熱有汗加地骨皮內熱無汗加牡丹皮腰痛加枸杞杜忡或加豬腰豬脊髓盜汗加棗仁五味子怔忡不寐加棗仁咳嗽加桑白皮枇杷葉百合有痰加貝母有血加藕汁童便食少加薏苡仁泄瀉去生地天冬加山茱白芍大棗蓮肉肺脈按之無力者宜加人參暖肝煎景嶽方此治陰寒疝氣之方疝屬肝病而陰寒為虛故用當歸二三錢枸杞三錢以補真陰之虛茯苓二錢以泄經腑之滯肉桂一二錢補火以鎮濁陰烏藥二錢利氣而疏邪逆小茴二錢沉香一錢或用木香為疝家本藥生薑為引辛以散之如寒甚者吳萸附子乾薑亦可加入腎氣丸仲景方六味地黃丸錢仲陽方加味腎氣丸濟生方仲景治虛勞痰飲消渴及婦人轉胞並用腎氣丸至崔氏移治腳氣上入更名八味丸後人遂為溫補命門之通劑至錢仲陽治小兒以體屬純陽故去桂附後人遂為峻補真陰之通劑至濟生方又於腎氣丸中加牛膝車前以治水腫方書或以六味地黃丸為主方或以加味腎氣為金匱腎氣丸由不明制方之源流也左歸丸景嶽方左歸宗錢仲陽六味丸減去丹皮者以丹皮過於動汗陰虛必多自汗盜汗也減去茯苓澤瀉者意在峻補不宜於淡滲也方用熟地之補腎為君八兩山藥之補脾四兩山茱之補肝四兩為臣配以枸杞補精四兩川膝補血三兩酒洗蒸熟精滑者不用菟絲補腎中之氣四兩鹿膠四兩敲碎炒珠龜膠四兩敲碎炒珠補督任之元雖曰左歸其實三陰並補水火交濟之方也至於加減之法如真陰失守虛火炎上者去枸杞鹿膠加女貞麥冬火爍肺金乾枯多嗽者加百合夜熱骨蒸者加地骨皮小水不利不清者加茯苓大便燥結者去菟絲加肉蓯蓉一切柔潤之品在所必用又如氣虛加人參血虛微滯加當歸腰膝痠痛加杜仲臟平無火而腎氣不充去龜膠加補骨脂蓮肉胡桃宜清宜補應寒應熱總在臨症化裁右歸丸景嶽方仲景腎氣丸意在水中補火故於群隊陰藥中加桂附而景嶽右歸峻補真陽方中惟肉桂二兩附子制二兩熟地八兩山藥四兩山茱四兩與腎氣丸同而亦減去丹皮之辛澤瀉茯苓之淡滲枸杞菟絲鹿膠三味與左歸丸同去龜膠牛膝之陰柔加杜仲四兩薑湯制當歸三兩便溏忌用溫潤之品補右腎之元陽即以培脾胃之生氣也其加減之法陽衰氣虛必加人參以為之主陽虛精滑或帶濁便溏加補骨脂飧泄腎泄不止加北五味肉豆蔻飲食減少或不易化或嘔吞酸加乾薑腹痛不止加吳茱萸腰膝痠痛加胡桃肉陰虛陽痿加巴戟肉蓯蓉或加黃狗外腎與鹿膠同為血肉之補誠為治命火衰微之要劑百勞丸勞瘵積滯即世俗所稱乾血勞是也而於婦女為多患此百無一痊大半都為藥壞非破氣即滋陰非寒涼即溫補俱未中病故無一效是方據許州陳大夫云此仲景所傳治一切勞瘵積滯不經藥壞者宜服則知此為治勞瘵積滯之第一方並以知曾經藥壞者服之不效矣方用乳香一錢沒藥一錢虻蟲十四個水蛭十四個大黃四錢桃仁十四個攻積消滯之中加人參二錢當歸二錢護持氣血是寓守於戰之意也煉蜜為丸急藥緩投則不傷於峻也百勞水杓揚百遍者是又名甘瀾水於五更時候取水下百丸一片清空之氣以蕩滌邪穢也惡物既下只服白粥十日取淡味以養陰以示不可驟用補劑也祛風丸潔古方枸杞白芍地骨皮生地熟地皆補血之品而加黃耆以固表枳殼以疏里甘草以和中一派調和營衛獨防風一味為風藥等分蜜丸而特名為祛風丸者以血行風自滅也四神丹東垣方元參當歸生地亦皆補血之品而加羌活之走經散表者於其間則能消解血分蘊積之風丸用等分煎服亦可是方與前方治癘風者俱可為久服之方取其調和營衛而不傷胃也化痰丸王節齋方痰因火而逆上凝結喉間吐咯難出者名老痰鬱痰病在至高之分非寒非濕若用辛溫香燥不特已過病所抑且以火濟火是方天冬一兩黃芩一兩以清肺連翹五錢青黛三錢另研以清心蛤粉一兩芒硝三錢另研軟堅散結香附三錢鹽湯浸炒橘紅一兩利氣寬胸蔞仁一兩為痰嗽所必需復用桔梗五錢舟楫之劑浮而上之此症根蒂已深非湯藥所能速愈故用丸以緩之用煉蜜少加薑汁以作丸者藉其辛甘之味留戀喉間也代溫中丸丹溪小溫中丸治腫脹之屬於濕熱者局方禹餘糧丸治水腫之屬於寒濕者二方並用針砂小溫中丸六君子合苦參黃連等意在補虛以去其濕熱熱為標而濕為本故以溫中立名禹餘糧丸以餘糧蛇黃針砂為主輔佐之屬不外開鬼門潔淨府去菀陳莝三法而復以薑桂附之大溫大熱則通陽祛陰奏功最捷不治水而水自逐矣然二方誠為腫脹要藥而一用人參貴重貧富不便道行一苦製法浩繁鄉野不能預備此代溫中丸之所由設也方用醋製針砂一兩性燥重墜能於胃中平肝邪克賊之氣香附三錢乾漆灰三錢一氣一血復以平胃散健脾燥濕蒸餅為丸湯酒任下並不雜入寒涼不失溫中之義旋覆花湯紅藍花酒皆仲景方是方仲景治肝著及半産漏下孫真人千金方亦採之後世罕用近時王晉三葉天士改用青蔥管理氣新絳和血治脅痛等症開後人治絡法門而我鄉不審制方之旨疑新絳為代紅花反議用者之好奇其實紅花與新絳治分天淵仲景云肝著其人常欲蹈其胸上未先苦時但欲飲熱蓋肝邪必由肺家傳來肝氣著而不行欲還之肺故常欲蹈其胸上用旋覆花者散結氣以安肺也其人素有積冷故先欲飲熱全用蔥之青白通陽以開積冷也新絳雖紅藍花染就而質本繭絲功能補脾且內有烏梅黃柏以監製之則取其和血而非破血所以婦人寒虛相搏半産漏下亦用此方至若紅花止治血結仲景另用紅藍花一味酒煎單服以治婦人六十二種風腹中血氣刺痛高明之士盍將仲景書細細繹之虎杖湯本事方許叔微本事方載此治婦人諸淋香岩葉氏云今世無識此藥每以土牛膝代之土牛膝一名地嵩功專消瘀取其根之鮮者洗淨搗爛絞汁大半茶杯調入麝香乳香各分許引入至陰之所隔湯燉熱服之屢有殊功不特女科宜用即男子通淋通瘀亦要藥也煎服治産後便閉及血蠱等症生花湯會稽錢氏方産後忌用酸寒故於四物中去白芍炮薑去血中之寒凡外受新邪及內傷積冷咸宜桃仁去皮尖生用則能和血留皮尖炒用則能破血且地黃生熟異功亦可隨症施用大便難者加肉蓯蓉若虛甚則加人參又當從補氣生血之例矣烏鰂骨丸內經方凡病實中有虛則當於虛處推求虛中有實即當於實處推求內經此方治血枯之病而轉用破瘀之藥以虛中有實也夫女子而至月事衰少而或不來時病出清液四肢清目眩唾血前後血而又不能食氣竭肝傷可知矣名曰血枯不亦宜乎據此病形似當溫補而其間不得不審察者因病有新久胸脅有寬否不能食有妨礙不妨礙之分若是暴病胸脅兼無支滿之苦投以溫補無疑矣此則胸脅支滿而妨於食是厥陰上乘陽明之候病至則先聞腥臊臭者腥臊為肝之本氣病至聞之不病時則不聞也原其病因總是瘀血為患此非得之一時良由少年時有所大脫血若醉入房中日積月纍而致此疾耳瘀血不去則新血不生故名血枯不同暴崩暴漏藥宜溫補者也治以烏鰂骨四分藘茹一分二物併合有破宿生新之妙丸以雀卵溫補助陽服藥五丸而後飯使其徐行下焦復飲以鮑魚汁取其臭穢之味以利腸垢而和肝傷也柳陰地黃丸本事方生地二兩柴胡黃芩秦艽各半兩赤芍一兩皆清肝之品凡師尼寡婦室女皆獨陰無陽欲心萌而不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞其脈弦出寸口為陰旺思男之候宜用此方蜜丸烏梅湯下斂而抑之使陰血得平則寒熱止矣六神散陳無擇方七味白朮散錢仲陽方星附六君子湯小兒血脈筋骨未充多虛熱亦多虛寒世醫於虛熱症惑於外感風寒而不知補中以除熱於虛寒症狃於稚年陽體而不知溫中以逐寒如病解後發熱不除與初病發熱不同乃元氣虛而陽浮於外也當用六神散固氣收陽之法如泄瀉作渴肌表發熱非感冒也乃津液少而脾胃虛也宜用白朮散升清降濁之法如慢驚嘔吐痰涎上潮此是純陰用事而不支也當用星附六君子湯固正祛邪之法三者皆以四君為主一加山藥扁豆一加木香藿香葛根一加南星白附子功堪鼎峙六神散不合生脈者治在脾而不關肺也不合四物者病在氣而不關血也六味皆沖和純粹之品收陽歸內尤為神效白朮散以二香佐四君因脾喜芳香補脾之功更捷以葛根甘寒直走陽明清陽得升而熱自除矣至若風痰非南星莫效寒痰非白附不除而當寇深之日有四君以坐鎮其間此為有制之師
