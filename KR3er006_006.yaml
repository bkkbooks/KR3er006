body:
  text: 卷六玉臺新案寒證醫案發熱惡寒頭疼身痛之暴證人易辨之惟久郁肺經而成喘嗽有似陰虛勞嗽者不可不辨郡城西門外奚藕莊客幕於外上年道途受熱曾患喘嗽服自便而愈今復患喘嗽投自便而加劇醫亦概用清肺補肺終不見效自疑為陰虛重證倣徨無措遂延豫診余為脈象見緊似數非數前患暑熱故自便可愈今患寒邪故反增劇用小青龍湯而愈魏湘舟郡城北門外猛將廟人瘍醫也患喘嗽二載遍試醫人總不出清肺補肺自亦疑為陰虛勞證豫囑其常服乾薑五味子堅守一月果得全效郡廟道士徐兆奎久患三瘧堅不服藥二年方愈愈後冬月又病傷寒壯熱頭痛醫疑冬溫誤投辛涼之劑即昏默不省人事醫者以其昏默不省以為熱邪內陷束身告辭其師楊承宗求治於豫豫診其脈虛軟無神似數非數亦為驚徨但知其瘧後中氣素虧復傷於寒非冬溫也即投溫中之劑一劑稍蘇二劑方醒三劑乃安粥飲日漸增加但膈中似有冷塊即於溫中劑內加附子三分始得平復調理一月而安徽人夏履成年六十有餘素日無疾忽於三更時候氣喘痰升昏昏默默不能自言所苦余系寓鄰即來叩門索治豫即往診見有出氣而無入氣即投大劑腎氣湯頃刻氣平而愈此證若待來朝索治必致不救發斑醫案發斑初用辛涼繼用鹹寒人人知之而陰斑之證最不可誤南匯承役許龍之子身熱發斑有似火證醫用犀角等化斑套劑病勢轉危不省人事口中歌唱不休有時譫語余診其脈浮越無倫按之不實舌絳而潤並不燥渴疑是陰證細詢病因其妻言未病時大叫腳冷其為陰證無疑遂用姜附等藥冷服一劑夜即安睡但元陽喪敗之餘神疲倦怠者半月服歸脾湯二十餘劑而愈火證醫案火證清之此其常也而有不得不急下者最當堅決得勝渡範某初病即昏沉醫用辛散汗後不解即驚徨推委余曰汗之不解治須下之前醫曰下之利不止奈何余曰右關沉實攻下無虞用大承氣合涼膈而愈南匯本城楊熙宗令郎病瘧寒熱俱輕飲食如故守不服藥之戒一日自神廟燒香而歸忽發狂言似有神靈所作邀余診視脈象沉鬱魄汗淋漓未能審其果為熱厥不敢驟用寒涼姑用膽星竹瀝與服服下人事頓清詢其近日所服何物曰薑棗湯日服兩次視其舌色面白底絳唇若塗朱知為熱邪無疑時已三更余見其病勢稍持約其明日轉方天明覆來邀診據述醒時未及三刻旋又發厥遂用犀角地黃湯合大承氣許其大便一行即愈奈他醫謂下則必死病家轉多疑慮時有張二川系楊內戚力動本家定服余方煎藥已近下午時候病者牙關緊閉強將羊角灌入服至半劑大便即解前恙頓除南匯姚裕豐醫士也秋月寒熱雜投藿香正氣香薷飲之類醫中來問病者必定一方其自己亦不能主持矣其父沛寰因其病勢危劇始來邀余余用急下之劑前醫交沮謂此屬不治之證何用下為余坐等其家煎服大下宿垢繼服滋補半月而愈治脈伏醫案前營遊擊舒公初夏病感寒熱頗輕但右脅以下掣痛不安頭痛亦在右邊大便不實醫以為類傷寒證用辛溫表散不效余按其脈隱伏不彰舌上灰色苔厚而濕潤欲滴初疑濕勝於熱用吳氏達原飲繼疑寒熱互結用進退黃連湯但有二三分效驗舒公深信不疑然必終奏全效余心始安沉思良久頭痛脅痛俱在右邊此熱氣鬱遏陽明故脈象不彰遂揀去溫藥專用三黃石膏堅服二十餘劑而愈時前營守備邢公亦患熱病初起即舌絳神昏醫皆用蔥豉湯透表余用涼膈散清中授方不服聽其津干液涸五日而亡官在同營病在一時或信或不信判若恩仇舒公曰總難逃一命字附録與姚敬修書令愛之證肝藏積熱肺受暴寒故沖氣上逆咳嗽發喘余用仲景麻杏甘膏湯發散外邪掃除內熱失此不治必延勞怯因受足下重託故再四沉思而用此方也得汗後用錢仲陽補肺阿膠散大下宿垢瘀滯後用喻氏清燥救肺湯石膏搜剔餘邪人參補氣阿膠補血乃虛實兼到之方寫方時賢喬梓細問畢竟吉凶何如豫一口擔承何嘗有片言驚駭其方其案尚在尊齊可覆視也足下受方不用先自倣徨更請某師診治誤認虛脫之證揚言左脈已無遂令合家大小涕淚交零並通知媒氏通知許字之家謂此證已被石膏吃壞今已不治矣噫某師久負盛名何徒恃妄才而不達古訓也夫脈之郁也被火逼勒耳非無也精究古大家書則悟此奧義矣某師言此是怯證非時邪也殊不知怯證初起亦須下去惡物古方百勞丸許州陳大夫託名仲景而傳者也某師亦嘗精究其義乎人言某師所定之方與豫方相似不知實判天淵余以人參石膏同用意仍在於清火某師以人參五味陳皮同用意專在於補虛不知此證大積雖去餘火尚多稍帶溫補尚慮復焰之勢人參只宜些少足下過費人參反致增病尊居之北有俞姓女病伏熱綿延四十餘日人用輕清不效余用石膏而效今歲少陰司天陽明在泉運氣使然也某師讀景嶽書不達玉女煎用石膏之旨其能升其堂而入其室乎前俞姓女服石膏後發出暑毒滿身其母不以為藥之過而以為藥之功奇哉婦人有識乃遠勝於丈夫也敬修得書之後其膽始壯余仍大進寒涼下利五日而全愈治老人醫案老人元虛病宜扶元人人知之竟有陽氣充實常服大寒之藥常得帶病延年者南匯本城謝凰鳴年七十有四因上年秋間涉訟到郡舟中冒暑即發溫瘧微寒惡熱胸膈痞悶余適寓郡城用清心涼膈散而寒熱止繼用半夏瀉心湯而痞悶除旋即結訟回南不再服藥延至初冬喘嗽大作醫用疏散愈治愈劇至新正初十外日夜不能交睫痰涎盈盆盈碗囑其子恩榮等速辦後事無餘望矣適有徽友汪郁廷在座謂此證仍請豫診治必有出奇制勝之處郡城僅一浦之隔何不專舟邀歸以一診凰鳴平日持家甚儉因欲死裡求生不得不從汪議余亦以世好難辭即束裝東歸時已正月十六夜診畢即知其誤用辛溫許以尚可挽救方用大劑白虎參入大劑犀角地黃堅服四十餘日而全愈若不細察其脈而但拘年齒以施治必至抱怨九泉至嘉慶二十五年重遊泮水至道光五年已八十有四一日不飲蔗汁梨漿等味即大便艱澀辛溫誤人有如此瘧疾醫案寒熱往來之瘧治宜小柴胡湯不知陰虛之體用之轉增大患者郡城姚敬修夏日病瘧醫投小柴胡十餘劑竟無增減停藥二日忽然發厥舌短眩暈危在頃刻居與余寓相近急來延診余用大劑清肝之藥一服而安知其多服柴胡肝陰虧乏厥陽亢逆也愈後四肢痠麻用養陰藥調理半年始得平復三陰久瘧陽虛氣虛人易知之不知初因暑熱而起者久瘧保陰為主南匯本城沈熙曾堅信余言服二十餘劑而愈其他服溫補而致斃者余親見二人也痢疾醫案府廩生高菊裳名崇瑚弟藥房名崇瑞選拔又中式令堂病陽虛久痢醫頻服溫補延至半載病反增劇晝夜三五十次余診時但述腰脊空痛異常遂用斑龍丸峻補奇脈初服一劑病勢大減自後連服數劑竟無增減服參些少略安片刻而菊裳藥房昆仲以尊人病怔忡經年參藥大費人參豈能常服余為沉思良久改用黃耆建中加鹿角時有醫士李蘅堂秀在座謂峻補之法繼以宣通陽氣亦是一法力贊此方為中病堅服二十餘劑而愈華庠生王羲令堂秋月病熱初延李孝廉謹診視用薄荷連翹山梔等俱用薑汁製服服後發厥復延一時醫診視用白虎湯清火人事雖清下痢不止改用補劑亦無效驗王生系瑤峰先生令孫餘本屬世好來寓力懇專治餘倍費苦思用仲景桃華湯而愈南匯東門李連城病肝氣脹痛因多服左金遂至下痢不止食飲不思人亦不與之食更醫則倏張倏李用藥則惟術惟苓僉云不治已措辦後事矣不得已而索治於余豫令其早上服大劑歸脾晚間服大劑六味並令家人誘其食肉即有效驗一月全痊勞倦內傷醫案南匯南門張寶華勞倦之餘又兼食滯及內傷中之有餘者脈象狂大熱渴異常子系舊戚平日相信不疑即用下奪清中之法但前因葬事太勞未即痊愈親友中有疑為失表之證囑其更請他醫調治醫謂從未得汗熱邪內陷之象用蔥豉等發汗汗竟不出反發昏沉仍懇豫治豫惟以清降為事漸漸神清食進始終無汗而愈愈後大便艱澀惟服大黃補藥一劑不服於以知外邪宜汗內傷禁汗內傷之虛者為勞倦傷宜補中益氣飲食傷虛中挾實者宜枳朮丸內傷之純實者則宜攻下也王安道辨之甚詳偏枯醫案新場鎮閔欽齊年五十外形體清瘦多火少痰冬月忽患偏枯在左遂從吳門解館而歸醫惟以補氣消痰為事反增咽燥喉痹等證病家謂本原既竭故用補劑不效延豫聊問消息余謂其脈其證純是一團火氣須用河間治火之法方用二地二冬知柏等甘寒苦寒相間投二劑頓覺神情清爽病者方意未病前數日左肩胛猶如火燒始信治火之說為不謬也繼服虎潛丸而全愈提憲稿房陳掌衡夫人患半身不遂體實瘦弱疑是血虛投溫經養血全無增減因思內經云痛者寒氣多也病在脈絡非辛烈猛重之味不能勝任服許學士川烏粥而愈痹證醫案風寒濕三氣合而為痹祛風祛寒祛濕人人知之不知有當變通者泗經戴星杓年近四十因煙業赴上洋一夕忽患腿痛不便行走寓中適有素明醫理者謂腎氣素虛乃欲中之漸必服大造丸可戴以客寓起居不便遂乘肩輿而歸本鎮及郡中之醫皆用溫藥並服大造丸服下掣痛增至十分兩手亦痛陽事痿縮遂延余診余謂此屬熱痹俗名流火是也舌苔雖白其實絳底陽事痿縮王節齊所云鬱火也遂用三黃石膏犀角地黃等大劑半月而起於床更用虎潛大補陰丸等一月後步履如常矣南庠生謝恩榮令堂患熱痹醫以為血衰氣弱投以補劑轉劇余用羚羊角二冬玉竹竹瀝等通絡之劑投數劑而全愈痿證醫案前營千總龔振邦多欲陰虧夏月病足膝痿弱余謂當作暑痿治清暑益氣加活血之品授方不服轉服傷科之藥一旦昏厥心痛欲死仍延余診脈來虛散生脈散加和中之品服一劑果覺少安渠家信之不篤遍請他醫通同酌治改用參地桂附服之轉增脹滿又請一醫以和中降氣為治脹滿雖稍除而元氣愈弱病者益難支撐改用參朮一劑而從前心痛欲死之證復作不得已遂聽命於豫焉余謂此屬少陰腎水虧乏轉服傷科之藥則氣亦虛矣參朮桂附適以耗陰橘半枳砂適以耗氣俱未中病故愈治愈劇壯水之主以制陽光乃正治也用六味合生脈等堅服五十餘劑而愈南匯營兵朱七官濕熱成痿求治於他縣時醫以峻補剛劑囑其頻服半月後厥陽上逆頭眩耳鳴胸中擾攘不安格寒於下兩腳如冰自分已無生理友人武生顧鳴鶴與朱鄰近延豫判決死生余按脈象狂大謂此證因溫補誤投非絶證也遂用芩連知柏豬膽汁等大寒之品一劑即減投二十餘劑而全愈郡城徐華封女病痿兩足不能相去以寸脊間皮寬肉軟有如斗大醫用雜補氣血之劑不效豫謂飲食如故病屬下焦耆朮守中不能達下四物誠為女科要藥若欲填實精髓則又不勝任矣考內經筋痿骨痿皆屬奇經絡病乃用生鹿角龜板海參魚膠羊肉等血肉之味配入熟地枸杞牛膝歸芍堅服三十餘劑而全痊虛勞醫案亭林鎮北陸某素患勞嗽時作時止至是益加氣喘偏臥不能轉側脈象細弱有似氣虛痰飲醫用補脾理氣久而不效遂以本證為辭豫適在鎮中顧宅延豫一判安危余謂此屬肺腎陰虧非氣虛也初用錢氏阿膠散繼用六味地黃湯而愈腫脹醫案府庠生王迪賢令堂患喘腫脈浮無汗渴飲異常宗仲景風水治例兼參王節齊先喘後腫之旨用麻杏甘膏湯而愈南匯本城李孝思單脹數月諸藥不效余按脈象沉微此屬陽微用塞因塞用法專服理中加附子而愈郡城卜姓女十有三歲先患痧疹繼患瘧疾醫用開泄太過遂至脹滿肚腹以下堅硬如石本家疑為虛證請一老醫中專用補藥者診治豈知竟云痧毒內攻法在不治余時初到郡中遂延余診余按其脈沉細而微脾虛景象顯然如繪初用錢氏白朮散而堅硬消繼用陳氏六神湯而脹滿愈得勝渡張永椿室系氣虛之體秋月患腹脹服消耗藥太過數日間腹大如臌余即用濟生腎氣立見奇效後稍有脹意即投前方而愈腳氣醫案郡廩生方鐵華剛令尊患腳氣上攻醫投燥濕理氣通陽之劑喘腫益加余謂諸熱之而寒者取諸陽因立加味腎氣湯初服不覺其功而亦不見其燥熱堅服三十餘劑而愈發黃醫案吳靜山敬權孝廉令正錢夫人時邪後遂發黃腫日嗜干茶無度蘇太諸醫皆用氣血並補久而不愈延余診之脈兩手俱洪數之甚詢得腹中攻痛無常夜則身熱如烙此由陰液不充瘀滯干黏所致宿血不去則肢體浮腫新血不生則肌肉消瘦一切補脾剛藥未可施於此證考仲景治黃有豬膏發煎潤燥之法爰仿其義專用滋潤之品調養腎肝而愈前營遊擊溫公大勇夏月自浦口來松途中冒暑到署後請醫調治初用清暑利濕不效改用參朮歸地轉增脘痛自後朝暮更醫僉言誤補留邪治難有效遂延余診余見其身面發黃總是胃腑結聚不行所致用連理湯辛開苦降法授方不服遂就診於青浦醫家方用茵陳五苓散等服之亦不效遂以絶證為辭歸至署中計無復出始委命以聽余焉豫仍用前法服參些少是夜即得安寢改用理中湯調理半月而愈後以禮貌之衰堅辭不往升金山參將後重發舊恙遂成不治之證矣濁證醫案濁證濕滯為多而亦有宜於溫固者上海徐德音濁下如涕醫不辨其為精濁概以利濕之法治之久不見效漸至食則易飢心火上亢腎水下趨形消腰折寒熱頻頻督脈陽維交病余謂此係精濁非便濁也用鹿角菟絲骨脂等溫補下焦兼服威喜丸而愈提憲稿房陳壽昌病濁醫者疑其腎陰虧損而致此疾早投補腎藥少腹脹痛欲死余用左金清火合雄鼠糞湯攻濁而愈頭痛醫案嘉定陳嫗年五十有七病頭痛數年額上為甚額屬陽明部分久痛必虛須填補陽明兼鼓舞胃中清陽之氣用玉屏風散加炙草葛根二劑全愈推此而太陽頭頂痛少陽頭角痛厥陰頭巔痛皆可按法而治矣高橋鎮曹連珍室操持家事頗勞兼多暴怒孟夏得疾自天柱至頭巔忽然強痛堅重難移兩耳赤腫胃中嘈雜脈象洪數宗喻氏治吳添官母例而愈腹痛醫案楓涇鎮宋元英境享安閒恣情房幃患腹痛二年醫藥不效遂就診於吳郡極時之醫以絶證為辭宋即歸家料理後事深信醫言為不謬余適過楓晤宋氏西席程永孚談及醫理遂為知己遂同元英來寓就診細按其脈細詢其證總是陰陽悖逆升降不利使然問曰曾服瀉心湯進退黃連湯否曰未也因酌一方以授投一劑而稍平數劑而全愈前余在嘉定有鄉人王四九官病膈向服和中藥據述投三四劑輒效逾時復然就診於豫投進退黃連湯不應改用丹溪韭汁牛乳飲而愈因知古人因證立方不相假也胎前醫案胎前宜涼人人知之而亦有宜於溫者胎前宜補血不宜破血而亦有轉用破血而得安者總在臨證時之細心體會也郡城孫錦章室懷胎五月病轉胞不溺醫用清利水道並不究及轉胞由於下焦虛寒由於中焦氣弱由於肝家血滯豬苓澤瀉車前等藥徒傷胃氣故飲食減少夜不得寐諸恙漸臻而胞系之繚戾者如故也日請穩婆抬起始得溺出究之元氣不支日甚一日因而延余診治余診其脈緩大有力許以可救遵金匱成例投腎氣湯一劑是夜稍得安寢蓋利水之藥足以瀉腎投桂附而命門溫暖故稍得安寢耳再遵丹溪補氣成例投參朮湯一劑飲食漸能知味惟病者大便不行已數日腹中至此更覺不安改用茱連湯一劑大便得解小便雖仍穩婆伺候病者因諸恙悉減深信不疑再求良治余為沉思者久之脈象比前益見有力元氣已復而胎氣未舉必有瘀血阻塞其間遂用大劑破血之藥一劑而脹遂消三劑而胎氣未舉凡破血之藥最足礙胎今破血而胎反固妙在先用補藥以助其元氣也産後醫案産後感冒時邪宜溫散不宜涼散人人知之而亦有不宜於溫而宜於涼者誤用溫則不得不用大寒矣歸鞠氏侄女冬月初産無恙至六日頭痛身熱凜凜畏寒豫用梔豉湯夜半熱退逾日復熱更醫用産後逐瘀成法遂加煩躁余謂冬溫為病清之可安通評虛實論曰乳子而病熱脈懸小者手足溫則生仍依時邪治例用白虎湯而愈凡産後無産證而染他證者即當以他證治之而丹溪大補氣血之言卻不可拘仲景云病解能食七八日更發熱者此為胃實大承氣湯主之夫陽明經中仲景尚再三戒人不可輕下而産後亡血既多仍云承氣主之蓋既為胃實自有不得不用之理舉一證而産後之挾實者可類推也仲景云産後下利虛極白頭翁加甘草阿膠湯主之夫既曰虛極仍用白頭翁湯者下痢中既有渴欲飲水熱而下重之證則白頭翁湯自有不得不用之理惟其虛極故加甘草阿膠以養其正舉一證而産後之挾虛者可類推也産後惡露不行胸腹飽脹溫之通之人人知之而亦有不宜於溫而宜於涼不宜於通而宜於和者東門鞠上玉室初産患此其脈數大而疾上兼鼻衄余用當歸二兩煎湯沖熱童便與服稍稍安穩但惡露止有點滴耳更醫用炮姜等溫通套劑遂至胸腹增脹惡露點滴不行有欲依産後春溫治例大進苦寒之品余曰又非穩治堅用歸地丹芍等涼血和血之劑十餘日惡露大行而全愈凡産後病解能食七八日更發熱者當作別病治初産後即發熱者則仍作産後治但各有寒熱兩途不可不條分縷析郡城侯姓婦年三下有八因元霄夜遊行走太勞歸即小産醫者皆以其胸腹有塊用逐瘀成法每劑必加炮姜俱未有效後雖停藥而骨節如焚積塊愈大小便艱澀熱痛異常至三月初始延余診已奄奄一息診其脈沉伏之極隱隱難尋豫固知其陰虛陽盛但日期多延宜用緩治初投復脈減去薑桂神氣稍安繼投丹溪大補陰丸諸恙悉減終投本事虎杖湯積塊平復淋痛皆除不及一月飲食大增而全愈得勝渡衛姓婦初産惡露不行發熱疼痛中挾冬溫伏氣醫用逐瘀溫經套劑遂至熱邪流注左腿日夜難安飲多食少至冬至朝延豫診治豫變産後宜溫之說用涼血大劑加通瘀解毒四服全愈郡城張六老室産後月餘崩中不止時當暑月醫用和中養血俱不能止病已三日夜視為必死余診其脈浮大欲脫連聲索救神氣尚清急令煎黃耆一兩當歸一兩服之頃刻立止古方當歸補血湯黃耆多於當歸五倍今加當歸與黃耆等分者時當暑月恐黃耆之過亢也血厥醫案郡城七星橋翁氏女經前發厥厥必數日不醒人事醫用朱黃膽星之屬經年不效己卯六月延豫診治脈象搏指余謂此係經血內瘀久而發厥非痰迷心竅也朱黃膽星焉能破瘀生新耶乃合內經烏鰂骨丸仲景旋覆花湯河間金鈴子散為一方數劑全痊竟不再發
