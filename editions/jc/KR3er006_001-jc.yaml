body:
  text: 卷一六經合論按仲景自序言作傷寒雜病論合十六卷則傷寒雜病未嘗分為兩書也所云太陽之為病脈浮頭項強痛而惡寒陽明之為病胃家實也少陽之為病口苦咽乾目眩太陰之為病腹滿而吐食不下自利益甚若下之必胸下結硬少陰之為病脈微細但欲寐也厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止是六經分司諸病之提綱不專為傷寒一症立法今之讀傷寒論者一惑於傳經之說再惑於三綱鼎立之說遂至經旨不明自程郊倩柯韻伯撇去舊解覺仲景所分之六經不特可以治風寒並可以治雜病頭痛發熱汗出惡風為桂枝本症脈浮弱為桂枝本脈一見此症此脈無問其為中風傷寒雜病也汗出而熱不解因邪在營衛之間不在皮毛之際故以桂枝生薑甘草大棗辛甘發散中配以芍藥酸寒用以發汗即用以止汗也又慮中氣虛餒不能送邪外出須助以熱粥經云飲入於胃以傳於肺肺主皮毛汗所從出服已啜粥充胃氣以達於肺也是方調和營衛不特自汗盜汗虛瘧虛痢所宜即勞倦內傷及一切陽虛等症咸宜用之以桂枝為建中之祖耳胸滿去芍藥喘加厚朴杏仁汗漏不止加附子亡陽起臥不安去芍藥加蜀漆龍骨牡蠣為救逆湯此皆進而從陽也若退而從陰者加黃芩為陽旦湯倍芍藥又治太陰腹滿微痛加大黃治太陰大實病難經云陽維為病苦寒熱陰維為病苦心痛後人並用桂枝湯以陽維屬衛陰維屬營桂枝湯調和營衛也專用芍藥甘草二味名芍藥甘草湯專治血虛腹痛乃泄木安土之義余痛不治以其酸寒無溫散之力也桂枝湯治表虛倍芍藥加膠飴名小建中湯桂枝為和劑建中為補劑也故不特傷寒心悸而煩及腹中急痛者宜之即虛勞裡急亡血失精等症金匱與黃耆建中湯並用又疸症篇云男子黃小便自利當與虛勞小建中湯則知此湯為治虛勞之專劑男子身黃便利顯屬虛寒而非濕熱故亦以此湯治之也是方加黃耆名黃耆建中湯意在保護肺氣不令自汗專為虛勞而設而非傷寒門所有事然許學士治傷寒無汗尺中脈遲不任發散者先用黃耆建中以實其氣後用麻黃湯以發其汗此又善於取裁矣千金於小建中湯加當歸名內補當歸建中湯治女科虛羸少氣裡急腹痛等症意在安營以補血故更其名曰內補也麻黃湯治頭痛發熱身疼腰痛骨節疼痛惡寒無汗而喘之症乃太陽發汗之峻劑桂枝湯中無麻黃且得芍藥之監製誤用尚可挽回是方麻桂辛溫佐以杏仁開氣雖有甘草之和猛銳莫當頗為難用時行感冒代以蔥豉湯九味羌活湯足矣凡遇冷風哮喘等症邪郁肺經而無涉於下焦真元者麻黃湯又為要劑本方去桂枝局方名三拗湯冬日無汗用之較本方為緩也仲景於本方中去桂枝加石膏更名麻杏甘膏湯治肺經郁遏作喘表寒裡熱之症小青龍湯於發汗中利水蓋汗為水類肺為水源傷寒表不解發汗而未透也心下為水氣即未出之汗也乾嘔發熱而咳或微喘邪未盡而停於肺胃之間也病屬有形非一派發汗所能愈故用麻黃之解表即用白芍五味之斂逆一以散水寒一以收喘咳也又加乾薑之溫肺細辛之溫腎半夏之除嘔甘草之緩中表裡分消水氣有不散者乎金匱用以治溢飲以飲亦水類四肢之水與心下之水同治也加石膏以治肺脹以水停心下而兼煩躁石膏辛寒即仿傷寒大青龍之旨也後人用小青龍治水腫以無汗而喘即遵內經開鬼門之治也方中五味乾薑尤為治表寒發咳之要藥所以小柴胡真武等湯方後俱云咳者加五味子乾薑五苓散與豬苓湯同治脈浮發熱渴欲飲水小水不利之症而一屬陽明必顯躁煩熱悶故於茯苓豬苓澤瀉利水之中加阿膠滑石以滋陰滌熱一屬太陽或太陽轉屬陽明必因發汗未透以致邪水內蓄故於茯苓豬苓澤瀉利水之中加白朮以健脾利水桂枝以散表除邪觀仲景云多服暖水汗出愈則知此方利水而兼發汗也後人移治交腸交腸者大小易位而出也金匱加茵陳治黃疸名茵陳五苓散後人去桂名四苓散純為利水之劑合平胃名胃苓湯又為消腫利濕之劑痞者天地不交之謂以邪氣痞塞於中上下不通而名滿而硬痛為結胃但滿不痛為痞諸家論痞或偏於寒或偏於熱究之寒熱互結則成痞惟其寒熱有差多差少故諸方或以附子之辛熱立名或以大黃黃連之苦寒立名或以生薑之辛散立名或以甘草半夏之和緩立名按甘草瀉心湯用乾薑半夏黃芩黃連甘草大棗六味益以人參名半夏瀉心益以人參生薑名生薑瀉心柯韻伯曰太陽變痞用生薑瀉心陽明變痞用甘草瀉心少陽變痞用半夏瀉心至大黃黃連瀉心湯止用大黃黃連二味再加黃芩附子名附子瀉心仲景立法原各有不同一言以蔽之不外辛開苦降而已治痞要藥在乾薑黃連二味半夏黃芩甘草大棗四味則輔佐而已偏於寒則多用乾薑亦可參以附子偏於熱則多用黃連亦可參以大黃偏於中虛則加人參或涉表邪一二則加生薑並可與旋覆代赭黃連等湯出入互用又按程郊倩曰若不因誤下而為痞者或痰或食或氣為之結俱非瀉心湯治更有陰經得寒而成痞逆者服瀉心湯必成大害大結胸證硬滿而痛不必定在心下故用硝黃葶藶甘遂等峻劑而小結胸但在心下按之則痛較大結胸之手不可近為緩而脈之浮滑又不同於沉緊但用黃連之苦以降之半夏之辛以散之栝蔞之苦以潤之先煎去渣微下黃沫即安以熱痰留滯不同蓄水橫溢故不用峻劑也梔子豉湯治陽明初病不全在表不全在裡汗下溫針皆在所禁惟用梔子一味先煎後內香豉為能雙解表裡外而身汗惡熱身重內而喘滿咽乾口苦一齊可解矣凡三陽合病腹滿身重譫語遺尿而大汗出白虎湯為要方石膏知母之寒監以甘草粳米則不傷胃氣加人參為人參白虎治陽明渴欲飲水口乾舌燥蓋熱已入胃不當復表屎未燥硬尚未可攻須用白虎以除熱潤燥人參以補氣生津金匱治中暍亦用人參白虎以暑邪汗多作渴雖曰太陽實系陽明也豬苓湯治脈浮發熱渴欲飲水小便不利證同五苓此方以陽明燥熱故用二苓澤瀉以利水即用滑石阿膠以滋陰不同太陽寒水之化故去朮桂二味消渴門中尤為要劑瘀熱在裡非汗吐所宜身無汗小便不利不得用白虎斑熱發黃內無津液不得用五苓故制茵陳蒿湯茵陳稟北方之色受霜承雪經冬不凋復感春生之氣發育因舊本而復茂故能啟水寒之氣上行梔子則導君火之氣以下行更入血分而通水之源大黃苦寒下泄導濕滌熱三物合用所以佐梔逗承氣之不及也難經云陽盛陰虛下之則愈用承氣下之乃所以存陰也然下劑不用滋陰而用破氣蓋胃主降穢物停滯胃中而不降由於氣之不承故以承氣名湯大承氣以厚朴枳實氣藥為君大黃芒硝血藥為臣因痞滿燥實堅五者全見勢甚盤結硝黃大寒必藉枳樸之苦溫以滌盪之煮法先內枳樸後內大黃又次內芒硝小承氣以大黃為君枳樸為臣胃腑實滿稍緩於三焦之實熱不用芒硝則不傷下焦真陰煎法三味同煮不分次第若調胃承氣以炙草硝黃微和胃氣不用枳樸勿令大泄下熱結有淺深用藥有輕重三承氣之用總在臨證化裁耳少腹脹滿而小便自利知為血蓄下焦蓄血能發熱故如狂桃仁承氣湯用芒硝大黃甘草即調胃承氣也熱甚搏血故加桃仁以潤燥緩肝表證未除故加桂枝以調營解表是方於女科經閉門中尤為要劑仲景抵當湯丸用水蛭虻蟲桃仁大黃四味為攻瘀血之峻劑而血蠱等證尤為要藥然水蛭鹹寒有毒未可輕試此代抵當丸所由設也方用桃仁歸尾生地各一兩潤以通之桂心三錢熱以動之大黃四兩元明粉一兩苦寒鹹寒以盪滌之加穿山甲一兩者引之以達瘀所煉蜜為丸甘以緩急也少陽屬膽清淨之府無出無入經在半表半裡治宜和解小柴胡湯用柴胡升陽達表黃芩退熱和陰半夏祛痰散逆參草薑棗輔正補中使邪不得復傳入里也其見證則嘔而發熱寒熱往來口苦耳聾胸滿脅痛心煩喜嘔但見一證即是亦何必諸證悉具始為小柴胡湯證哉崔氏小前胡湯即本方以前胡易柴胡子和柴胡飲子即本方去半夏加當歸白芍大黃大柴胡湯治陽邪入里表證未除里證又急者用柴胡解表大黃枳實攻裡黃芩清熱白芍斂陰半夏和胃止嘔薑棗調和營衛是方比三承氣為緩以不用芒硝之燥急也太陽少陽合病必有頭痛胸滿口苦咽乾寒熱往來之病機或大或弦之脈象陽邪入里膽火移熱於脾故自下利黃芩湯用黃芩徹熱為君佐白芍甘草大棗以和營氣雖非胃實亦非胃虛故不須人參以補中兼痰飲則嘔故仍加半夏生薑後人移治春溫伏熱機要以之治痢更名黃芩芍藥湯是方遂為治痢之祖方矣胸中有熱而欲嘔吐胃中有寒而作腹痛此上熱下寒也濕家下之丹田有熱胸中有寒此上寒下熱也黃連湯為升降陰陽之通劑與小柴胡兩解表裡實為對待方中人參補虛半夏除嘔甘棗緩中四味與小柴胡同余則彼用柴胡而此易以桂枝彼用黃芩而此易以黃連彼用生薑而此易以乾薑和解雖同而上下之邪與表裡之邪異矣是方與瀉心諸湯出入互用仲景云理中者理中焦則知太陰厥逆自利不渴脈沉無力者當以此方為主方中人參補氣益胃為君白朮健脾燥濕為臣甘草和中補土為佐乾薑溫胃散表為使仲景本用丸劑後人改丸為湯加附子名附子理中取補火生土之意加黃連名連理湯參辛開苦降之治脾約丸太陰下劑也津液被約而未至虧損者宜之麻仁杏仁甘以潤之枳實厚朴苦以破之白芍大黃寒以下之使胃不過強而脾不過弱津液流通使小便不數而大便不硬則約者自開四逆湯以炙草為君乾薑附子為臣通脈四逆湯以乾薑為君炙草附子為臣因加減中有面色赤者加蔥之例後人遂以加蔥為通脈四逆四逆與理中同治太陰臟寒自利不渴四肢厥逆等證而制方有中下之別理中用白朮取其守中故專治太陰四逆用生附取其溫下故不時兼治三陰即太陽亦可通用柯韻伯曰用於太陰本經固本以逐邪也於少陰溫土以制水也於厥陰和土以升木也於太陽益火以扶元陽也本方加人參名人參四逆湯加茯苓人參名茯苓四逆湯去炙草名曰姜附子湯去炙草加蔥白名白通湯再加人尿豬膽汁名白通加豬膽汁湯陶節庵變易其制於蔥白乾薑附子外加人參五味麥冬收陰生脈面色赤者更加黃連少許大破其格拒之陰廣皮芳香利氣甘草甘緩和中臘茶苦降達下更用土漿水澄清煎藥取土氣以靜鎮之衝入白蜜冷服者藉寒潤以急趨之也真武湯與小青龍同為利水之劑青龍治太陽邪水內蓄汗劑以升散之也真武治少陰真水泛溢溫劑以鎮攝之也方中附子益坎宮之少火以配水佐白朮之健以制水茯苓之淡以滲水白芍之酸以收水生薑之辛以散水後人移治內飲以飲亦水類也腎氣丸為里中之裡真武用生薑尚為里中之表歟吳茱萸湯治陽明少陰二經虛寒之證仲景以陽明病不能食者名中寒食谷欲吐或乾嘔或吐涎沫是胃氣虛寒不能容物也頭痛者陽明之脈上於頭也仲景以吐利煩躁四逆為少陰死症今吐利手足厥冷是專指手掌與四逆之通冷者回別故雖煩躁欲死究非死症並用此湯吳茱辛熱為通陽泄濁之要藥故以為君人參薑棗補益中氣使土有以制水而水不上侵矣桃花湯用赤石脂一半煎服一半為末調服取其固下乾薑粳米辛甘相得取其守中治下利不止便膿血者夫下利而兼便膿血則非下利清穀全屬虛寒可知便膿血而由於下利不上則非裡急後重全屬濕熱可知讀者須會徐之才澀可去脫之條兼參李東垣升陽散火之義黃連阿膠湯治少陰熱邪傳裡心煩不寐之症黃芩黃連直清心火白芍收斂心神阿膠雞子黃生沖滋補心神且二物交通乎腎亦以見芩連之輔佐少陰與他經不同豬膚湯以豬為水蓄而膚又津液所存滋陰而不滑泄佐以白蜜米粉潤肺保脾熬香熱服功能引熱下行治少陰病下利咽痛胸滿心煩方雖平淡實出神奇烏梅丸治蛔厥又主久利泄肝安胃法也蟲得酸則軟而無力上攻且酸為木味助本氣也故用烏梅苦酒之酸蟲得辛則伏而其頭向下且辛為金味制木邪也故用蜀椒之辣且細辛生薑桂枝附子當歸莫非味之辛者姜附之用溫經而復陽細辛雖入少陰亦能散寒而通陽桂枝和營衛而治其厥人參同姜附則溫補中州當歸一味以厥陰本為血臟而宜之黃柏黃連即內經熱因寒用之旨恐寒邪拒格即以寒藥引道之所謂治寒以熱涼而行之也王晉三制安胃湯治飢不欲食一症川椒之辛炒去汗佐烏梅之酸安吉者良行陰以化肝枳實乾薑用生淡者助人參行陽道以益氣黃連真川清脾胃生化之源統論全方辛酸同用以化肝氣酸甘相輔以和胃氣肝化胃和自能進食白頭翁湯治熱毒血痢口渴下重之症白頭翁苦寒而能息風秦皮苦寒而能固脫黃連苦寒而能燥濕黃柏苦寒而能堅陰四面搜逐伏邪則上焦之渴下焦之利俱可止矣金匱加阿膠甘草以治產後下痢因產後虛極兼顧其氣血也燒褌散治陰陽易症而朱奉議有豭鼠糞湯治陰易豭鼠雄鼠也其糞兩頭尖者即是復以韭白取以濁攻濁之義後人移治遺濁疝氣及女人淋帶等症少腹疼痛者屢有殊功竹葉石膏湯治傷寒解後虛羸少氣氣逆欲吐之症竹葉石膏之辛寒以散餘熱人參甘草麥冬粳米之甘平補虛生津生薑半夏之辛溫豁痰止嘔雖曰寒劑亦和劑也移治暑熱煩渴等症少變人參白虎之例旋覆代赭湯治傷寒解後噫氣一症人參甘草扶正補虛薑棗半夏和脾養胃旋覆花之辛旋轉於上代赭之重鎮逆於下後人治頑痰用代赭煅末旋覆花湯調服亦良法也再按噫氣有屬於土木交旺者則又從事於承氣左金之例炙甘草湯又名復脈湯治脈結代心動悸者雖於太陽傷寒見之而不止太陽為然傷寒為然諸病之後皆然故千金以治虛勞外臺以治肺痿蓋氣血並虛法當陰陽兼補此氣者何手太陰肺也此血者何手少陰心也所謂脈為心合者是也此氣此血皆屬輕清而非重濁觀此方用人參炙草桂枝薑棗以補氣而不用耆朮則不患燥陰即所以調和營衛用麥冬生地阿膠麻仁以補血而不用歸芍則不患滯陽即所以復脈通心且更君以炙草助以清酒皆於輕清二字相協成功薛生白曰長沙夫子用阿膠何曾云炒後人畫蛇添足耳阿膠之用專為濟水伏流也炒之濟水何在哉險症每在陽明少陰二經最當詳辨喻嘉言治黃長人犯房勞病傷寒守不服藥之戒身熱已退十餘日外忽然昏沉渾身戰慄手足如冰一醫已合就姜附之藥矣喻用調胃承氣湯約重五錢煎成熱服半盞少頃又熱服半盞人事大清忽然渾身壯熱再與大柴胡一劑熱退身安凡傷寒初起發熱煎熬津液鼻乾口渴便秘漸至發厥者不問知其為熱也蓋犯房勞而病感者其勢不過比常較重如發熱則熱之極惡寒則寒之極頭痛則痛之極所以然者陰虛陽往乘之非陰盛無陽之比況病者始能勿藥陰邪必輕安得以陰厥之例為治耶又治徐國楨傷寒六七日索水到前復置不飲異常大躁將門牖洞啟身臥地上展轉不快更求入井一醫洶洶急以承氣與服喻診其脈洪大無倫重按無力謂曰此用人參附子乾薑之症奈何認為下症耶觀其得水不欲咽情已大露豈水尚不欲咽反可飲大黃芒硝乎於是以附子乾薑各五錢人參三錢甘草二錢煎成冷服服後寒戰戛齒有聲以重綿和頭覆之縮手不肯與診陽微之狀始著再與前藥一劑微汗熱退而安厥逆一症有陰陽之分凡四肢厥逆外見張目不眠聲音響亮口臭氣粗身輕惡熱之症為陽厥法主破陽行陰以止其厥若外見目瞑蜷臥聲低息短少氣懶言身熱腹寒之症為陰厥法主祛陰散寒以回其陽譫語一症有陰陽虛實不同經言實則譫語虛則鄭聲在陽明為實症為譫語乃陽明胃實燥結不通火亢極陽真陰立亡而神明內亂譫語無倫法主大承氣湯急祛其陽以救其陰在少陰為虛症為鄭聲乃少陰中寒魄汗出而下利氣虛陽脫神魂無主細語呢喃錯亂顛倒法主四逆理中急回其陽以固其脫煩躁一症陰陽互關曰陽煩陰躁又曰煩出於心躁出於腎其實不然煩者未有不躁躁者未有不煩煩躁皆同而症之陰陽不同有為少陰亡陽身熱多汗而煩躁者乃腎中真陽隨汗而浮越於外法主溫補以回其陽有為陽明熱越身熱多汗而煩躁者乃胃中津液隨汗而盡越於外法主人參白虎等法以徹其熱昏睡一症在少陰為陰霾甚而陽不開法當急回其陽以御其陰在陽明則有熱甚神昏法當速徹其熱以退其陽且昏睡與不眠其症不同而法則同在陽明張目不眠者其常也然又有熱熾神昏之症其人均為口臭氣粗汗出惡熱其法亦均當徹其熱在少陰但欲寐者其常也然又有里陰過勝格拒真陽隨汗外越不得內交於陰亦不得眠其人均為頭眩身重少陰懶言其法亦均當回其陽昔人以仲景河間東垣丹溪為四大家然仲景醫中時聖也三子則伯夷伊尹柳下惠而已試觀傷寒方中黃芩白虎已開河間之先也建中理中已開東垣之先也復脈黃連阿膠已開丹溪之先也然則謂三子得仲景之一端而引伸之則可謂三子補仲景之未備則未確也凡病不外六經精於傷寒法乃可通治雜病蓋雜病之規矩準繩已畢具於傷寒中也如虛損之症保陰液則復脈宜投護陽氣則建中是賴痰飲之症開太陽則青龍有效攝少陰則真武多功中風風痹等症桂枝湯之加減具見神奇中寒寒厥等症四逆輩之裁成皆堪貴重溫熱以黃芩為主取其酸苦堅陰暑暍以白虎加參借其甘寒制火濕症宜發汗利水而麻黃五苓當增味以取效燥症宜養血益陰而膠連復脈可節錄以見長噎膈忌用辛香惟瀉心湯可開可降關格忌投劫奪惟黃連湯能降能升血症破瘀在上則大黃黃連瀉心湯在下則桃仁承氣抵當湯而復脈尤滋陰調血之聖劑水症攻邪在表則青龍及越婢湯在內則大陷胸與十棗湯而真武尤溫經利水之良方消渴之證太陽則五苓文蛤陽明則白虎豬苓哮喘之證兼寒則桂枝樸杏兼熱則麻杏甘膏疸證腹滿而嘔仍取柴胡小便自利仍取建中而谷疸始專事乎茵陳瘧證調和營衛不離桂枝開發腠理不離柴胡而溫瘧則借材於白虎瀉痢諸證烏梅丸為寒熱兼投之劑而暴注下迫則白頭翁豬苓豬膚葛根黃連黃芩湯是也至若白通通脈桃花等劑又治陰寒下利者矣嘔吐諸證小柴胡為表裡兼解之方而虛陽上逆則五苓散竹葉石膏湯黃芩半夏生薑湯是也至若吳萸四逆理中等劑又治中虛作嘔者矣多汗有白虎桂枝四逆不寐有豬苓梔豉膠連大便閉則承氣脾約密煎是也小便閉則五苓豬苓茵陳是也婦人熱入血室陽明受邪少陽乘之與丈夫異者故另立規條也小兒寒中陰經太陰最多厥陰間有與大人同者即共此方法也既悟微旨於傷寒之中自得妙法於傷寒之外更參金匱如逢故我豈有異致哉
